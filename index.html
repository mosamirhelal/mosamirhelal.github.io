<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-VJE9JMTR99"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-VJE9JMTR99");
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>let me cook</title>

    <style>
      /* ... كل أكواد الـ CSS زي ما هي بالظبط ...
      (تنسيق الـ body، والصور، والزرار، والـ hover)
      ...
      */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #ffffff;
        transition: background-color 0.3s ease;
      }
      img.responsive-center {
        max-width: 100%;
        max-height: 100vh;
        height: auto;
      }
      body.dark-mode {
        background-color: #000000;
      }
      #dark-image {
        display: none;
      }
      body.dark-mode #light-image {
        display: none;
      }
      body.dark-mode #dark-image {
        display: block;
      }
      #theme-toggle {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: #333;
        color: #ffffff;
        border: none;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        font-size: 24px;
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        transition: background-color 0.3s ease, color 0.3s ease,
          transform 0.2s ease;
        z-index: 1000;
      }
      #theme-toggle:hover {
        transform: scale(1.1);
      }
      #theme-toggle:active {
        transform: scale(0.9);
      }
      body.dark-mode #theme-toggle {
        background-color: #eee;
        color: #000000;
      }
    </style>
  </head>

  <body>
    <img
      src="شايفك-يا-حرامي-يا-الي-رايح-تنزل-الصورة-بتاعتي-وعايز-تعمل-ميم-بيها.jpg"
      alt="light mode image"
      class="responsive-center"
      id="light-image"
    />
    <img
      src="dark.jpg"
      alt="dark mode image"
      class="responsive-center"
      id="dark-image"
    />
    <button id="theme-toggle" title="تغيير الوضع">🌙</button>

    <script>
      // 1. عرف العناصر
      const toggleBtn = document.getElementById('theme-toggle');
      const body = document.body;

      // 2. دالة "تطبيق" الثيم (بتغير الـ CSS بس)
      function applyTheme(theme) {
        if (theme === 'dark') {
          body.classList.add('dark-mode');
          toggleBtn.textContent = '☀️';
          toggleBtn.title = 'تفعيل الوضع النهاري';
        } else {
          body.classList.remove('dark-mode');
          toggleBtn.textContent = '🌙';
          toggleBtn.title = 'تفعيل الوضع الليلي';
        }
      }

      // 3. "مراقب" وضع المتصفح
      const prefersDarkMatcher = window.matchMedia(
        '(prefers-color-scheme: dark)'
      );

      // 4. "المستمع" (بيشتغل لما وضع المتصفح يتغير لايف)
      // ده دايماً شغال وهيكسب في الآخر
      prefersDarkMatcher.addEventListener('change', (e) => {
        applyTheme(e.matches ? 'dark' : 'light');
      });

      // 5. لما الزرار يتضغط (اختيار يدوي مؤقت)
      toggleBtn.addEventListener('click', () => {
        // اقلب الوضع اللي موجود حالياً
        const isDarkMode = body.classList.contains('dark-mode');
        applyTheme(isDarkMode ? 'light' : 'dark');
      });

      // 6. عند فتح الصفحة لأول مرة (مفيش localStorage)
      // بص على المتصفح وطبق
      applyTheme(prefersDarkMatcher.matches ? 'dark' : 'light');
    </script>
  </body>
</html>
