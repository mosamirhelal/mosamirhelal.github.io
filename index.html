<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>let me cook</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        background-color: #ffffff;
        
        /* === (تعديل 1) === 
           غيرنا المدة والسرعة عشان تبقى زي الصورة
        */
        transition: background-color 0.4s ease-in-out; 
      }

      img.responsive-center {
        max-width: 100%;
        max-height: 100vh;
        height: auto;
        grid-area: 1 / 1;

        /* === (تعديل 2) === 
           بطأنا السرعة شوية عشان تبقى مريحة للعين
        */
        transition: opacity 0.4s ease-in-out;
      }

      body.dark-mode {
        background-color: #000000;
      }

      /* (باقي كود الـ CSS زي ما هو متغيرش) */
      #light-image {
        opacity: 1;
      }
      #dark-image {
        opacity: 0;
      }
      body.dark-mode #light-image {
        opacity: 0;
      }
      body.dark-mode #dark-image {
        opacity: 1;
      }
      #theme-toggle {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: #333;
        color: #ffffff;
        border: none;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        font-size: 24px;
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        transition: background-color 0.3s ease, color 0.3s ease,
          transform 0.2s ease;
        z-index: 1000;
      }
      #theme-toggle:hover {
        transform: scale(1.1);
      }
      #theme-toggle:active {
        transform: scale(0.9);
      }
      body.dark-mode #theme-toggle {
        background-color: #eee;
        color: #000000;
      }
    </style>
  </head>

  <body>
    <img
      src="شايفك-يا-حرامي-يا-الي-رايح-تنزل-الصورة-بتاعتي-وعايز-تعمل-ميم-بيها.jpg"
      alt="light mode image"
      class="responsive-center"
      id="light-image"
    />
    <img
      src="dark.jpg"
      alt="dark mode image"
      class="responsive-center"
      id="dark-image"
    />
    <button id="theme-toggle" title="تغيير الوضع">🌙</button>

    <script>
      const toggleBtn = document.getElementById('theme-toggle');
      const body = document.body;

      function applyTheme(theme) {
        if (theme === 'dark') {
          body.classList.add('dark-mode');
          toggleBtn.textContent = '☀️';
          toggleBtn.title = 'تفعيل الوضع النهاري';
        } else {
          body.classList.remove('dark-mode');
          toggleBtn.textContent = '🌙';
          toggleBtn.title = 'تفعيل الوضع الليلي';
        }
      }

      const prefersDarkMatcher = window.matchMedia(
        '(prefers-color-scheme: dark)'
      );

      prefersDarkMatcher.addEventListener('change', (e) => {
        applyTheme(e.matches ? 'dark' : 'light');
      });

      toggleBtn.addEventListener('click', () => {
        const isDarkMode = body.classList.contains('dark-mode');
        applyTheme(isDarkMode ? 'light' : 'dark');
      });

      applyTheme(prefersDarkMatcher.matches ? 'dark' : 'light');
    </script>
  </body>
</html>
