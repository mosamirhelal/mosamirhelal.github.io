<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-VJE9JMTR99"
    ></script>
    <script>

      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-VJE9JMTR99");

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>let me cook</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* === (تعديل 1) === 
        استخدمنا Grid عشان نحط الصورتين فوق بعض
      */
      body {
        display: grid; /* اتغيرت من flex */
        place-items: center; /* بديل justify-content و align-items */
        min-height: 100vh;
        background-color: #ffffff;
        transition: background-color 0.3s ease;
      }

      /* === (تعديل 2) === 
        هنا بنظبط الصورتين عشان يبقوا فوق بعض 
        وبنديلهم الأنيميشن
      */
      img.responsive-center {
        max-width: 100%;
        max-height: 100vh;
        height: auto;
        
        /* السطر ده بيخليهم هما الاتنين في نفس المكان (فوق بعض) */
        grid-area: 1 / 1; 

        /* ده الأنيميشن بتاع الشفافية */
        transition: opacity 0.3s ease-in-out; 
      }

      body.dark-mode {
        background-color: #000000;
      }

      /* === (تعديل 3) === 
        ده الكود الجديد بدل display: none 
      */

      /* الوضع الافتراضي (النهاري) */
      #light-image {
        opacity: 1; /* الصورة الفاتحة ظاهرة */
      }
      #dark-image {
        opacity: 0; /* الصورة الغامقة مخفية */
      }

      /* الوضع الليلي */
      body.dark-mode #light-image {
        opacity: 0; /* الصورة الفاتحة تختفي بالتدريج */
      }
      body.dark-mode #dark-image {
        opacity: 1; /* الصورة الغامقة تظهر بالتدريج */
      }
      
      /* ... (باقي كود الزرار زي ما هو متغيرش) ... */
      #theme-toggle {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background-color: #333;
        color: #ffffff;
        border: none;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        font-size: 24px;
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        transition: background-color 0.3s ease, color 0.3s ease,
          transform 0.2s ease;
        z-index: 1000;
      }
      #theme-toggle:hover {
        transform: scale(1.1);
      }
      #theme-toggle:active {
        transform: scale(0.9);
      }
      body.dark-mode #theme-toggle {
        background-color: #eee;
        color: #000000;
      }
    </style>
  </head>

  <body>
    <img
      src="شايفك-يا-حرامي-يا-الي-رايح-تنزل-الصورة-بتاعتي-وعايز-تعمل-ميم-بيها.jpg"
      alt="light mode image"
      class="responsive-center"
      id="light-image"
    />
    <img
      src="dark.jpg"
      alt="dark mode image"
      class="responsive-center"
      id="dark-image"
    />
    <button id="theme-toggle" title="تغيير الوضع">🌙</button>

    <script>
      const toggleBtn = document.getElementById('theme-toggle');
      const body = document.body;

      function applyTheme(theme) {
        if (theme === 'dark') {
          body.classList.add('dark-mode');
          toggleBtn.textContent = '☀️';
          toggleBtn.title = 'تفعيل الوضع النهاري';
        } else {
          body.classList.remove('dark-mode');
          toggleBtn.textContent = '🌙';
          toggleBtn.title = 'تفعيل الوضع الليلي';
        }
      }

      const prefersDarkMatcher = window.matchMedia(
        '(prefers-color-scheme: dark)'
      );

      prefersDarkMatcher.addEventListener('change', (e) => {
        applyTheme(e.matches ? 'dark' : 'light');
      });

      toggleBtn.addEventListener('click', () => {
        const isDarkMode = body.classList.contains('dark-mode');
        applyTheme(isDarkMode ? 'light' : 'dark');
      });

      applyTheme(prefersDarkMatcher.matches ? 'dark' : 'light');
    </script>
  </body>
</html>
