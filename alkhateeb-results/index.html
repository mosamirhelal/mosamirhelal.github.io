    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "Cairo", sans-serif;
        text-align: center;
        margin: 0;
        padding: 20px;
        background-color: #c9d0d9;
        animation: fadeInPage 0.55s ease-out;
        overflow-x: hidden;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      @keyframes fadeInPage {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes floatDot {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-18px);
        }
      }
      @keyframes popIn {
        0% {
          opacity: 0;
          transform: scale(0.85);
        }
        70% {
          transform: scale(1.04);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes rowIn {
        from {
          opacity: 0;
          transform: translateX(-12px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes pulseGlow {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(0, 86, 179, 0.7);
        }
        70% {
          transform: scale(1.02);
          box-shadow: 0 0 0 15px rgba(0, 86, 179, 0);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(0, 86, 179, 0);
        }
      }
      @keyframes floatDown {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(105vh) rotate(45deg) translateX(20px);
          opacity: 0;
        }
      }
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
      @keyframes ripple {
        from {
          transform: scale(0);
          opacity: 1;
        }
        to {
          transform: scale(3.5);
          opacity: 0;
        }
      }
      .dot {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        background: rgba(0, 86, 179, 0.05);
        animation: floatDot ease-in-out infinite;
      }
      .container {
        background: white;
        padding: 40px;
        border-radius: 15px;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        animation: slideInUp 0.8s ease-out;
        position: relative;
        z-index: 10;
      }
      .top-logos {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 15px;
        width: 100%;
        gap: 20px;
      }
      .top-logos img {
        max-height: 120px;
        max-width: 45%;
        width: auto;
        object-fit: contain;
      }
      .header-image {
        text-align: center;
        margin-bottom: 25px;
        padding: 0 10px;
      }
      .header-image img {
        width: 100%;
        max-width: 500px;
        height: auto;
      }
      h2 {
        color: #0056b3;
        margin-top: 10px;
        margin-bottom: 20px;
        font-size: 26px;
        font-weight: 800;
      }
      .form-control {
        font-size: 16px;
        padding: 12px 15px;
        border-radius: 11px;
        display: block;
        font-family: inherit;
      }
      .input-group {
        position: relative;
        width: 100%;
        max-width: 350px;
        margin: 0 auto 15px auto;
      }
      .input-group-icon {
        position: absolute;
        top: 50%;
        right: 15px;
        transform: translateY(-50%);
        color: #aab0bb;
        font-size: 18px;
        pointer-events: none;
        z-index: 2;
      }
      input,
      textarea {
        width: 100%;
        display: block;
        border: 2px solid #e1e1e1;
        transition: all 0.3s ease;
        font-family: inherit;
      }
      input {
        direction: ltr;
        text-align: center;
        padding-right: 45px !important;
      }
      input:disabled {
        background-color: #f5f5f5;
        cursor: not-allowed;
      }
      textarea {
        resize: vertical;
        padding: 12px 15px;
        border-radius: 11px;
        max-width: 450px;
        margin: 0 auto 15px auto;
      }
      input:focus,
      textarea:focus {
        border-color: #0056b3;
        box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        outline: none;
      }
      button {
        background-color: #0056b3;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        max-width: 350px;
        margin: 0 auto;
        display: block;
        transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
        position: relative;
        overflow: hidden;
        font-family: inherit;
      }
      button:hover:not(:disabled) {
        background-color: #004494;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
      button:active:not(:disabled) {
        transform: translateY(1px);
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      button:disabled {
        background-color: #6c757d;
        cursor: not-allowed;
      }
      .btn-text {
        position: relative;
        z-index: 2;
      }
      .ripple-span {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        transform: scale(0);
        animation: ripple 0.6s ease-out forwards;
        pointer-events: none;
        z-index: 1;
      }
      .pulse-button {
        animation: pulseGlow 1.5s infinite;
      }
      .btn-share {
        background-color: #008080;
        margin-top: 15px;
      }
      .btn-share:hover:not(:disabled) {
        background-color: #006666;
      }
      .btn-success {
        background-color: #28a745;
      }
      .btn-success:hover:not(:disabled) {
        background-color: #218838;
      }
      #result:not(:empty) {
        margin-top: 20px;
      }
      .student-info-appear {
        animation: slideInUp 0.5s ease-out forwards;
      }
      #capture-area {
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 15px;
      }
      h3.student-name {
        color: #8f250c;
        margin-top: 10px;
        font-size: 21px;
        font-weight: 800;
        animation: popIn 0.5s ease-out;
      }
      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin-top: 20px;
        background-color: white;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid #eee;
      }
      th,
      td {
        border-bottom: 1px solid #eee;
        border-left: 1px solid #eee;
        padding: 15px;
        text-align: center;
      }
      th:last-child,
      td:last-child {
        border-left: none;
      }
      tr:last-child td {
        border-bottom: none;
      }
      th {
        background-color: #0056b3;
        color: white;
        font-weight: 700;
      }
      tbody tr {
        transition: background 0.15s;
      }
      tbody tr:nth-child(even) {
        background-color: #fbfbfb;
      }
      tbody tr:hover {
        background: #eef4ff;
      }
      .row-anim {
        opacity: 0;
        animation: rowIn 0.35s ease forwards;
      }
      .total-row {
        font-weight: bold;
        background-color: #bcb8b1 !important;
      }
      .perc-block {
        margin-top: 25px;
        padding-top: 15px;
        border-top: 2px dashed #eee;
        text-align: center;
      }
      .perc-label {
        font-size: 16px;
        color: #4a4e69;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .perc-num {
        font-size: 38px;
        font-weight: 900;
        letter-spacing: -1px;
        line-height: 1;
        transition: color 0.4s;
      }
      .perc-sym {
        font-size: 22px;
        font-weight: 700;
      }
      .status-message {
        padding: 12px;
        border-radius: 8px;
        margin-top: 20px;
        font-size: 16px;
        font-weight: bold;
        width: 100%;
        animation: popIn 0.5s 0.1s ease-out both;
      }
      .congrats-message {
        background-color: #008000;
        color: #f2e8cf;
        border: 1px solid #c3e6cb;
      }
      .fail-message {
        background-color: #b23a48;
        color: #fed0bb;
        border: 1px solid #f5c6cb;
      }
      .feedback-section {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 2px dashed #eee;
        animation: fadeIn 0.5s ease-out 1s forwards;
        opacity: 0;
      }
      .loader {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #0056b3;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
        display: none;
      }
      .designer-credit {
        margin-top: 15px;
        font-size: 13px;
        color: #4a4e69;
        text-align: center;
        font-weight: bold;
      }
      .visit-counter {
        margin-top: 15px;
        font-size: 12px;
        color: #4a4e69;
        font-weight: bold;
        animation: slideInUp 0.8s ease-out;
        z-index: 10;
        position: relative;
      }
      .falling-emoji {
        position: fixed;

        font-size: 35px;
        z-index: 9999;

      #export-header,

      @media (min-width: 768px) {
        .top-logos img {
          max-height: 160px;

        }

      @media (max-width: 480px) {
        body {
          padding: 15px 10px;
        }

          padding: 25px 20px;
          border-radius: 10px;
        }
        .top-logos img {
          max-height: 90px;
        }
        h2 {
          font-size: 22px;
        }
        th,

        .input-group,
        textarea {
          max-width: 100%;
        }
        .perc-num {
          font-size: 30px;
        }
      }
    </style>

  <body>
    <div

      "
    ></div>
    <div

        top: 20%;

        animation-duration: 8s;
        animation-delay: 1s;
      "
    ></div>
    <div
      class="dot"
      style="
        width: 120px;

        top: 55%;

        animation-duration: 10s;
        animation-delay: 2s;
      "
    ></div>
    <div

    ></div>
    <div

      style="

        animation-duration: 9s;
        animation-delay: 3s;

    ></div>

    <div class="container">
      <div class="top-logos">
        <img src="logo_2.webp" alt="شعار وزارة التربية والتعليم" />
        <img src="logo_1.webp" alt="شعار مدرسة الشهيد محمود علي الخطيب" />
      </div>
      <div class="header-image">
        <img
          src="logo_3.webp"
          alt="مدرسة الشهيد محمود علي الخطيب الرسمية للغات"
        />
      </div>
      <h2>استعلام عن النتيجة</h2>
      <div class="input-group">
        <span class="input-group-icon">👤</span>
        <input
          type="text"
          inputmode="numeric"
          maxlength="14"
          id="nationalId"
          class="form-control"
          placeholder="أدخل رقم الطالب"
          oninput="this.value = this.value.replace(/[^0-9]/g, '')"
        />
      </div>
      <button
        onclick="addRipple(event, this); getGrade()"
        id="searchBtn"
        class="form-control pulse-button"
      >
        <span class="btn-text">🔎 بحث</span>
      </button>
      <div class="loader" id="loader"></div>
      <div id="result"></div>
      <div class="designer-credit">تصميم وتنفيذ : سمير هلال</div>
    </div>
    <div class="visit-counter">
      عدد زيارات الموقع : <span id="visitCount">...</span>
    </div>

    <script>
      fetch("https://api.counterapi.dev/v1/alkhateeb/visits/up")
        .then((res) => res.json())
        .then((data) => {
          document.getElementById("visitCount").innerText =
            data.count.toLocaleString("ar-EG");
        })
        .catch(() => {
          document.getElementById("visitCount").innerText = "-";
        });

      document
        .getElementById("nationalId")
        .addEventListener("keypress", function (event) {
          if (event.key === "Enter") {
            event.preventDefault();
            const btn = document.getElementById("searchBtn");
            addRipple(event, btn);
            getGrade();
          }
        });

      function addRipple(e, btn) {
        const rect = btn.getBoundingClientRect();
        let x, y;
        if (e.clientX !== undefined && e.clientX !== 0) {
          x = e.clientX - rect.left;
          y = e.clientY - rect.top;
        } else if (e.touches && e.touches.length > 0) {
          x = e.touches[0].clientX - rect.left;
          y = e.touches[0].clientY - rect.top;
        } else {
          x = rect.width / 2;
          y = rect.height / 2;
        }
        const size = Math.max(rect.width, rect.height);
        const span = document.createElement("span");
        span.className = "ripple-span";
        span.style.width = span.style.height = size + "px";
        span.style.left = x - size / 2 + "px";
        span.style.top = y - size / 2 + "px";
        btn.appendChild(span);
        setTimeout(() => span.remove(), 600);
      }

      function countUp(el, target, duration, suffix, decimals = 0) {
        const start = performance.now();
        function tick(now) {
          const p = Math.min((now - start) / duration, 1);
          const eased = 1 - Math.pow(1 - p, 3);
          const val = eased * target;
          el.innerText =
            (decimals > 0 ? val.toFixed(decimals) : Math.round(val)) +
            (suffix || "");
          if (p < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }

      function showEmojis(isSuccess) {
        const happyEmojis = ["🥳", "😄", "👏", "🏆", "🎉", "😘"];
        const sadEmojis = ["😥", "😭", "☹️", "😣", "😓"];
        const emojisToUse = isSuccess ? happyEmojis : sadEmojis;
        for (let i = 0; i < 15; i++) {
          setTimeout(() => {
            const emoji = document.createElement("div");
            emoji.classList.add("falling-emoji");
            emoji.innerText =
              emojisToUse[Math.floor(Math.random() * emojisToUse.length)];
            emoji.style.left = Math.random() * 100 + "vw";
            emoji.style.animationDuration = Math.random() * 3 + 4 + "s";
            document.body.appendChild(emoji);
            setTimeout(() => emoji.remove(), 7000);
          }, i * 150);
        }
      }

      function toggleFeedbackForm() {
        document.getElementById("showFeedbackBtn").style.display = "none";
        var formContainer = document.getElementById("feedbackFormContainer");
        formContainer.style.display = "block";
        formContainer.style.animation = "fadeIn 0.5s ease-out forwards";
        setTimeout(() => {
          window.scrollTo({
            top: document.body.scrollHeight,
            behavior: "smooth",
          });
          document.getElementById("feedbackInput").focus();
        }, 100);
      }

      function resetSearch() {
        document.getElementById("result").innerHTML = "";
        var natIdInput = document.getElementById("nationalId");
        natIdInput.value = "";
        window.scrollTo({ top: 0, behavior: "smooth" });
        setTimeout(() => natIdInput.focus(), 500);
      }

      function sendFeedback(
        studentName,
        studentId,
        studentGrade,
        studentSection
      ) {
        var feedbackText = document.getElementById("feedbackInput").value;
        var btn = document.getElementById("submitFeedbackBtn");
        var btnText = btn.querySelector(".btn-text");
        var statusMsg = document.getElementById("feedbackStatus");
        var feedbackTitle = document.getElementById("feedbackTitle");

        if (!feedbackText.trim()) {
          statusMsg.innerHTML =
            "<span style='color: red;'>الرجاء كتابة رأيك أولاً.</span>";
          return;
        }

        btn.disabled = true;
        btnText.innerText = "⏳ جاري الإرسال...";
        statusMsg.innerHTML = "";

        var url =
          "https://script.google.com/macros/s/AKfycbx8JBu5aQKAf3cKN9kEss8RiFHoW9DiqbgSlLO3JiIRxtXEzsJh3MU1sgIU2cVPP-rNkw/exec";

        var payload = {
          action: "submitFeedback",
          studentName: studentName,
          studentId: studentId,
          studentGrade: studentGrade,
          studentSection: studentSection,
          feedbackText: feedbackText,
        };

        fetch(url, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload),
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.status === "success") {
              btnText.innerText = "✅ تم الإرسال بنجاح!";
              statusMsg.innerHTML =
                "<span style='color: green;'>شكراً لك! تم إرسال رسالتك للإدارة.</span>";
              setTimeout(() => {
                btn.style.display = "none";
                feedbackTitle.style.display = "none";
                document.getElementById("feedbackInput").style.display = "none";
                statusMsg.innerHTML =
                  "<span style='color: green; display: block; margin-bottom: 15px;'>شكراً لك! تم إرسال رسالتك للإدارة.</span>" +
                  "<button class='form-control' style='background-color: #890620; color: white;' onclick='addRipple(event,this); resetSearch()'><span class='btn-text'>🔄 للبحث عن نتيجة طالب آخر</span></button>";
              }, 1500);
            } else {
              throw new Error("فشل الحفظ");
            }
          })
          .catch(() => {
            btn.disabled = false;
            btnText.innerText = "📨 إرسال الاقتراح";
            statusMsg.innerHTML =
              "<span style='color: red;'>حدث خطأ، يرجى المحاولة لاحقاً.</span>";
          });
      }

      async function shareResult(studentName) {
        var captureDiv = document.getElementById("capture-area");
        var shareBtn = document.getElementById("shareBtn");
        var btnText = shareBtn.querySelector(".btn-text");
        var originalText = btnText.innerText;

        btnText.innerText = "⏳ جاري تحضير الصورة...";
        shareBtn.disabled = true;

        try {
          const canvas = await html2canvas(captureDiv, {
            scale: 2,
            useCORS: true,
            backgroundColor: "#ffffff",
            scrollY: -window.scrollY,
            onclone: function (clonedDoc) {
              var noAnimStyle = clonedDoc.createElement("style");
              noAnimStyle.innerHTML =
                "* { animation: none !important; transition: none !important; opacity: 1 !important; transform: none !important; }";
              clonedDoc.head.appendChild(noAnimStyle);
              var clonedArea = clonedDoc.getElementById("capture-area");
              clonedArea.style.width = "800px";
              clonedArea.style.maxWidth = "none";
              clonedArea.style.padding = "40px";
              clonedArea.style.margin = "0 auto";
              clonedArea.style.overflow = "visible";
              clonedDoc.getElementById("export-header").style.display = "block";
              clonedDoc.getElementById("export-footer").style.display = "block";
            },
          });

          const blob = await new Promise((resolve) =>
            canvas.toBlob(resolve, "image/png")
          );
          let count = parseInt(localStorage.getItem("shareCount") || "0") + 1;
          localStorage.setItem("shareCount", count);
          const fileName = `نتيجة_${studentName}_${count}.png`;
          const file = new File([blob], fileName, { type: "image/png" });
          const isMobile = /Android|iPhone|iPad|iPod/i.test(
            navigator.userAgent
          );

          if (
            isMobile &&
            navigator.canShare &&
            navigator.canShare({ files: [file] })
          ) {
            try {
              const link = document.createElement("a");
              link.href = URL.createObjectURL(blob);
              link.download = fileName;
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
              await navigator.share({
                title: `نتيجة ${studentName}`,
                text: `نتيجة الطالب ${studentName} - مدرسة الشهيد محمود علي الخطيب`,
                files: [file],
              });
            } catch (err) {}
            btnText.innerText = originalText;
            shareBtn.disabled = false;
          } else {
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            shareBtn.style.backgroundColor = "#28a745";
            btnText.innerText = "✅ تم مشاركة الصورة بنجاح!";
            setTimeout(() => {
              shareBtn.style.backgroundColor = "";
              btnText.innerText = originalText;
              shareBtn.disabled = false;
            }, 5000);
          }
        } catch (error) {
          btnText.innerText = originalText;
          shareBtn.disabled = false;
          alert("حدث خطأ أثناء تحضير الصورة");
        }
      }

      function getGrade() {
        var idInput = document.getElementById("nationalId");
        var id = idInput.value;
        var resultDiv = document.getElementById("result");
        var loader = document.getElementById("loader");
        var searchBtn = document.getElementById("searchBtn");
        var searchBtnText = searchBtn.querySelector(".btn-text");

        resultDiv.innerHTML = "";

        if (!id) {
          resultDiv.innerHTML =
            "<div style='color:red; margin-top:15px;' class='student-info-appear'>الرجاء إدخال رقم الطالب أولاً</div>";
          return;
        }

        loader.style.display = "block";
        searchBtn.disabled = true;
        idInput.disabled = true;
        searchBtn.classList.remove("pulse-button");
        searchBtnText.innerText = "⏳ جاري البحث...";

        var url =
          "https://script.google.com/macros/s/AKfycbx8JBu5aQKAf3cKN9kEss8RiFHoW9DiqbgSlLO3JiIRxtXEzsJh3MU1sgIU2cVPP-rNkw/exec?id=" +
          id;

        fetch(url)
          .then((response) => response.json())
          .then((data) => {
            loader.style.display = "none";
            searchBtn.disabled = false;
            idInput.disabled = false;
            searchBtn.classList.add("pulse-button");
            searchBtnText.innerText = "🔎 بحث";

            if (data.status === "success") {
              var numericPerc = parseFloat(data.percentage);
              var totalDisplay = !isNaN(parseFloat(data.total))
                ? `<span id="totalNum">0</span>`
                : data.total;

              let barColor = "#0056b3";
              if (!isNaN(numericPerc)) {
                barColor = numericPerc >= 50 ? "#008000" : "#b23a48";
              }

              var statusMessageHtml = "";
              if (!isNaN(numericPerc)) {
                if (numericPerc >= 50) {
                  statusMessageHtml = `<div class="status-message congrats-message">تتقدم إدارة مدرسة الشهيد محمود علي الخطيب بخالص التهاني بالنجاح والتفوق 🏆</div>`;
                } else {
                  statusMessageHtml = `<div class="status-message fail-message">حظ أوفر، نتمنى منك أن تجتهد أكثر في المرة القادمة</div>`;
                }
              }

              var subjectsHtml = data.subjects
                .map(function (sub, index) {
                  var animDelay = 0.06 * (index + 1);
                  return `<tr class="row-anim" style="animation-delay: ${animDelay}s">
                          <td>${sub.name}</td>
                          <td>${sub.max}</td>
                          <td>${sub.score}</td>
                        </tr>`;
                })
                .join("");

              var totalAnimDelay = 0.06 * (data.subjects.length + 1);

              const percBlock = `<div class="perc-block">
                    <div class="perc-label">النسبة المئوية</div>
                    <div class="perc-num" style="color:${barColor};"><span id="percNumVal">0</span><span class="perc-sym">%</span></div>
                  </div>`;

              var html = `
                <div class="student-info-appear">
                  <div id="capture-area">
                    <div id="export-header" style="display: none;">
                      <div style="display: flex; justify-content: center; align-items: center; margin-bottom: 25px; width: 100%; gap: 30px;">
                        <img src="logo_2.webp" crossorigin="anonymous" style="height: 140px; width: auto; object-fit: contain;" />
                        <img src="logo_1.webp" crossorigin="anonymous" style="height: 140px; width: auto; object-fit: contain;" />
                      </div>
                      <h4 style="color: #4a4e69; margin-top: 0; margin-bottom: 25px; border-bottom: 2px dashed #eee; padding-bottom: 15px; font-size: 22px;">مدرسة الشهيد محمود علي الخطيب الرسمية للغات</h4>
                    </div>
                    <h3 class="student-name">الاسم: ${data.name}</h3>
                    <h4 style="color: #0056b3; margin-top: 0;">الصف: ${data.grade}</h4>
                    <table>
                      <thead><tr><th>المادة</th><th>الدرجة النهائية</th><th>درجة الطالب</th></tr></thead>
                      <tbody>
                        ${subjectsHtml}
                        <tr class="row-anim total-row" style="animation-delay: ${totalAnimDelay}s">
                          <td>المجموع الكلي</td><td>${data.total_max}</td><td>${totalDisplay}</td>
                        </tr>
                      </tbody>
                    </table>
                    ${percBlock}
                    ${statusMessageHtml}
                    <div id="export-footer" style="display: none; margin-top: 30px; font-size: 16px; color: #4a4e69; text-align: center; font-weight: bold; border-top: 2px solid #eee; padding-top: 15px;">تصميم وتنفيذ : سمير هلال</div>
                  </div>
                  <button id="shareBtn" class="form-control btn-share" onclick="addRipple(event,this); shareResult('${data.name}')"><span class="btn-text">📸 مشاركة النتيجة كصورة</span></button>
                  <div class="feedback-section">
                    <button id="showFeedbackBtn" class="form-control pulse-button" onclick="addRipple(event,this); toggleFeedbackForm()"><span class="btn-text">💬 إضافة رأي أو مقترح</span></button>
                    <div id="feedbackFormContainer" style="display: none; text-align: center;">
                      <h4 id="feedbackTitle" style="color: #333; margin-bottom: 15px; font-size: 18px;">سجل رأيك أو مقترحاتك:</h4>
                      <textarea id="feedbackInput" rows="3" placeholder="اكتب رسالتك هنا..." lang="ar" dir="rtl"></textarea>
                      <button id="submitFeedbackBtn" class="form-control btn-success" onclick="addRipple(event,this); sendFeedback('${data.name}', '${id}', '${data.grade}', '${data.section}')"><span class="btn-text">📨 إرسال الاقتراح</span></button>
                      <div id="feedbackStatus" style="margin-top: 10px; font-weight: bold; text-align: center;"></div>
                    </div>
                  </div>
                </div>`;

              resultDiv.innerHTML = html;

              setTimeout(() => {
                const percNumVal = document.getElementById("percNumVal");
                const totalNum = document.getElementById("totalNum");
                if (percNumVal && !isNaN(numericPerc))
                  countUp(percNumVal, numericPerc, 1200, "", 2);
                if (totalNum && !isNaN(parseFloat(data.total))) {
                  const tVal = parseFloat(data.total);
                  countUp(totalNum, tVal, 1000, "", tVal % 1 !== 0 ? 2 : 0);
                }
              }, 100);

              if (!isNaN(numericPerc)) {
                if (numericPerc >= 50) {
                  setTimeout(() => {
                    confetti({
                      particleCount: 150,
                      spread: 80,
                      origin: { y: 0.6 },
                      zIndex: 9999,
                    });
                    showEmojis(true);
                  }, 400);
                } else {
                  setTimeout(() => showEmojis(false), 400);
                }
              }
            } else {
              resultDiv.innerHTML = `<div style='color:red; margin-top:15px;' class='student-info-appear'>${data.message}</div>`;
            }
            setTimeout(() => {
              window.scrollTo({
                top: document.body.scrollHeight,
                behavior: "smooth",
              });
            }, 200);
          })
          .catch(() => {
            loader.style.display = "none";
            searchBtn.disabled = false;
            idInput.disabled = false;
            searchBtn.classList.add("pulse-button");
            searchBtnText.innerText = "🔎 بحث";
            resultDiv.innerHTML =
              "<div style='color:red; margin-top:15px;' class='student-info-appear'>حدث خطأ في الاتصال بقاعدة البيانات. تأكد من الرابط.</div>";
          });
      }
    </script>
  </body>
</html>
