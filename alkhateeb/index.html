<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نتيجة الطلاب - مدرسة الشهيد محمود علي الخطيب</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <meta
      property="og:title"
      content="نتيجة الطلاب - مدرسة الشهيد محمود علي الخطيب"
    />
    <meta property="og:description" content="استعلم عن نتيجتك بالرقم القومي" />
    <meta
      property="og:image"
      content="https://mosamirhelal.com/alkhateeb/logo_3.webp"
    />
    <meta property="og:type" content="website" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        margin: 0;
        padding: 40px 20px;
        background-color: #c9d0d9;
        animation: fadeInPage 1s ease-out;
        overflow-x: hidden;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 15px;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        animation: slideInUp 0.8s ease-out;
        position: relative;
        z-index: 10;
      }

      .top-logos {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 15px;
        width: 100%;
        gap: 20px;
      }

      .top-logos img {
        max-height: 160px;
        max-width: 48%;
        width: auto;
        object-fit: contain;
      }

      .header-image {
        text-align: center;
        margin-bottom: 25px;
        padding: 0 10px;
      }

      .header-image img {
        width: 100%;
        max-width: 580px;
        height: auto;
      }

      h2 {
        color: #0056b3;
        margin-top: 10px;
        margin-bottom: 20px;
        font-size: 24px;
      }

      .form-control {
        font-size: 16px;
        padding: 12px 15px;
        border-radius: 8px;
        max-width: 350px;
        margin-left: auto;
        margin-right: auto;
        display: block;
      }

      input,
      textarea {
        width: 100%;
        margin: 0 auto 15px auto;
        display: block;
        border: 2px solid #e1e1e1;
        transition: all 0.3s ease;
        font-family: inherit;
      }

      input {
        direction: ltr;
        text-align: center;
        max-width: 350px;
      }

      textarea {
        resize: vertical;
        padding: 12px 15px;
        border-radius: 8px;
        max-width: 450px;
      }

      input:focus,
      textarea:focus {
        border-color: #0056b3;
        box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        outline: none;
      }

      button {
        background-color: #0056b3;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        max-width: 350px;
        margin: 0 auto;
        display: block;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      button:hover {
        background-color: #004494;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      button:active {
        transform: translateY(1px);
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .pulse-button {
        animation: pulseGlow 1.5s infinite;
      }

      @keyframes pulseGlow {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(0, 86, 179, 0.7);
        }
        70% {
          transform: scale(1.02);
          box-shadow: 0 0 0 15px rgba(0, 86, 179, 0);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(0, 86, 179, 0);
        }
      }

      .btn-share {
        background-color: #008080;
        margin-top: 15px;
      }

      .btn-share:hover {
        background-color: #006666;
      }

      #result:not(:empty) {
        margin-top: 20px;
      }

      .student-info-appear {
        animation: fadeIn 0.5s ease-out forwards;
      }

      #capture-area {
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 15px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background-color: white;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #eee;
      }

      th,
      td {
        border: 1px solid #eee;
        padding: 15px;
        text-align: center;
      }

      th {
        background-color: #0056b3;
        color: white;
        font-weight: 600;
      }

      tr:nth-child(even) {
        background-color: #fbfbfb;
      }

      .total-row {
        font-weight: bold;
        background-color: #bcb8b1 !important;
      }

      .percentage {
        font-size: 22px;
        font-weight: bold;
        color: #0056b3;
        margin-top: 25px;
        text-align: center;
        border-top: 2px dashed #eee;
        padding-top: 15px;
      }

      .status-message {
        padding: 12px;
        border-radius: 8px;
        margin-top: 20px;
        font-size: 16px;
        font-weight: bold;
        width: 100%;
      }

      .congrats-message {
        background-color: #008000;
        color: #f2e8cf;
        border: 1px solid #c3e6cb;
      }

      .fail-message {
        background-color: #b23a48;
        color: #fed0bb;
        border: 1px solid #f5c6cb;
      }

      .feedback-section {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 2px dashed #eee;
        animation: fadeIn 0.5s ease-out 1s forwards;
        opacity: 0;
      }

      .btn-success {
        background-color: #28a745;
      }

      .btn-success:hover {
        background-color: #218838;
      }

      .loader {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #0056b3;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
        display: none;
      }

      .designer-credit {
        margin-top: 15px;
        font-size: 13px;
        color: #4a4e69;
        text-align: center;
        font-weight: bold;
      }

      .falling-emoji {
        position: fixed;
        top: -50px;
        font-size: 35px;
        z-index: 9999;
        pointer-events: none;
        animation: floatDown linear forwards;
      }

      @keyframes floatDown {
        0% {
          transform: translateY(0) rotate(0deg) translateX(0);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(105vh) rotate(45deg) translateX(20px);
          opacity: 0;
        }
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
      @keyframes fadeInPage {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 20px 10px;
        }
        .container {
          padding: 25px 20px;
          border-radius: 10px;
        }
        .top-logos {
          margin-bottom: 15px;
        }
        .top-logos img {
          max-height: 110px;
        }
        .header-image {
          margin-bottom: 15px;
          padding: 0;
        }
        h2 {
          font-size: 24px;
          margin-bottom: 15px;
          margin-top: 10px;
        }
        th,
        td {
          padding: 10px;
          font-size: 14px;
        }
        .form-control,
        input,
        button {
          max-width: 100%;
        }
        textarea {
          max-width: 100%;
        }
        .percentage {
          font-size: 20px;
        }
        .status-message {
          font-size: 14px;
        }
        .designer-credit {
          font-size: 12px;
          margin-top: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top-logos">
        <img src="logo_2.webp" alt="شعار وزارة التربية والتعليم" />
        <img src="logo_1.webp" alt="شعار مدرسة الشهيد محمود علي الخطيب" />
      </div>

      <div class="header-image">
        <img
          src="logo_3.webp"
          alt="مدرسة الشهيد محمود علي الخطيب الرسمية للغات"
        />
      </div>

      <h2>استعلام عن النتيجة</h2>

      <input
        type="text"
        inputmode="numeric"
        maxlength="14"
        id="nationalId"
        class="form-control"
        placeholder="أدخل الرقم القومي للطالب"
        oninput="this.value = this.value.replace(/[^0-9]/g, '')"
      />
      <button onclick="getGrade()" id="searchBtn" class="form-control">
        بحث
      </button>

      <div class="loader" id="loader"></div>

      <div id="result"></div>

      <div class="designer-credit">تصميم وتنفيذ : سمير هلال</div>
    </div>

    <script>
      document
        .getElementById("nationalId")
        .addEventListener("keypress", function (event) {
          if (event.key === "Enter") {
            event.preventDefault();
            getGrade();
          }
        });

      function checkEmpty(value) {
        if (value === "" || value === null || value === undefined) {
          return "-";
        }
        return value;
      }

      function showEmojis(isSuccess) {
        const happyEmojis = ["🥳", "😄", "👏", "🏆", "🎉", "😘"];
        const sadEmojis = ["😥", "😭", "☹️", "😣", "😓"];
        const emojisToUse = isSuccess ? happyEmojis : sadEmojis;
        const emojiCount = 15;

        for (let i = 0; i < emojiCount; i++) {
          setTimeout(() => {
            const emoji = document.createElement("div");
            emoji.classList.add("falling-emoji");
            emoji.innerText =
              emojisToUse[Math.floor(Math.random() * emojisToUse.length)];
            emoji.style.left = Math.random() * 100 + "vw";
            emoji.style.animationDuration = Math.random() * 3 + 4 + "s";
            document.body.appendChild(emoji);
            setTimeout(() => {
              emoji.remove();
            }, 7000);
          }, i * 150);
        }
      }

      function toggleFeedbackForm() {
        document.getElementById("showFeedbackBtn").style.display = "none";
        var formContainer = document.getElementById("feedbackFormContainer");
        formContainer.style.display = "block";
        formContainer.style.animation = "fadeIn 0.5s ease-out forwards";

        setTimeout(() => {
          window.scrollTo({
            top: document.body.scrollHeight,
            behavior: "smooth",
          });
          document.getElementById("feedbackInput").focus();
        }, 100);
      }

      function resetSearch() {
        document.getElementById("result").innerHTML = "";
        var natIdInput = document.getElementById("nationalId");
        natIdInput.value = "";
        window.scrollTo({ top: 0, behavior: "smooth" });
        setTimeout(() => {
          natIdInput.focus();
        }, 500);
      }

      function sendFeedback(studentName, studentId) {
        var feedbackText = document.getElementById("feedbackInput").value;
        var btn = document.getElementById("submitFeedbackBtn");
        var statusMsg = document.getElementById("feedbackStatus");
        var feedbackTitle = document.getElementById("feedbackTitle");

        if (!feedbackText.trim()) {
          statusMsg.innerHTML =
            "<span style='color: red;'>الرجاء كتابة رأيك أولاً.</span>";
          return;
        }

        btn.disabled = true;
        btn.innerText = "جاري الإرسال...";
        statusMsg.innerHTML = "";

        fetch("https://formsubmit.co/ajax/samirhelal2298@gmail.com", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Accept: "application/json",
          },
          body: JSON.stringify({
            _subject: "اقتراح جديد من موقع النتيجة",
            "اسم الطالب": studentName,
            "الرقم القومي": studentId,
            "الرأي أو المقترح": feedbackText,
          }),
        })
          .then((response) => response.json())
          .then((data) => {
            btn.innerText = "تم الإرسال بنجاح!";
            statusMsg.innerHTML =
              "<span style='color: green;'>شكراً لك! تم إرسال رسالتك للإدارة.</span>";

            setTimeout(() => {
              btn.style.display = "none";
              feedbackTitle.style.display = "none";
              document.getElementById("feedbackInput").style.display = "none";
              statusMsg.innerHTML =
                "<span style='color: green; display: block; margin-bottom: 15px;'>شكراً لك! تم إرسال رسالتك للإدارة.</span>" +
                "<button class='form-control' style='background-color: #890620; color: white;' onclick='resetSearch()'>للبحث عن نتيجة طالب آخر</button>";
            }, 1500);
          })
          .catch((error) => {
            btn.disabled = false;
            btn.innerText = "إرسال الاقتراح";
            statusMsg.innerHTML =
              "<span style='color: red;'>حدث خطأ، يرجى المحاولة لاحقاً.</span>";
          });
      }

      async function shareResult(studentName) {
        var captureDiv = document.getElementById("capture-area");
        var shareBtn = document.getElementById("shareBtn");
        var originalText = shareBtn.innerText;

        shareBtn.innerText = "⏳ جاري تحضير الصورة...";
        shareBtn.disabled = true;

        try {
          const canvas = await html2canvas(captureDiv, {
            scale: 2,
            useCORS: true,
            backgroundColor: "#ffffff",
            windowWidth: 800,
            onclone: function (clonedDoc) {
              var clonedArea = clonedDoc.getElementById("capture-area");
              clonedArea.style.width = "800px";
              clonedArea.style.maxWidth = "none";
              clonedArea.style.padding = "40px";
              clonedArea.style.margin = "0 auto";
              clonedDoc.getElementById("export-header").style.display = "block";
              clonedDoc.getElementById("export-footer").style.display = "block";
            },
          });

          const blob = await new Promise((resolve) =>
            canvas.toBlob(resolve, "image/png")
          );

          let count = parseInt(localStorage.getItem("shareCount") || "0") + 1;
          localStorage.setItem("shareCount", count);
          const fileName = `نتيجة_${studentName}_${count}.png`;
          const file = new File([blob], fileName, { type: "image/png" });

          const isMobile = /Android|iPhone|iPad|iPod/i.test(
            navigator.userAgent
          );

          if (
            isMobile &&
            navigator.canShare &&
            navigator.canShare({ files: [file] })
          ) {
            try {
              const link = document.createElement("a");
              link.href = URL.createObjectURL(blob);
              link.download = fileName;
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);

              await navigator.share({
                title: `نتيجة ${studentName}`,
                text: `نتيجة الطالب ${studentName} - مدرسة الشهيد محمود علي الخطيب`,
                files: [file],
              });
            } catch (err) {}
            shareBtn.innerText = originalText;
            shareBtn.disabled = false;
          } else {
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            shareBtn.style.backgroundColor = "#28a745";
            shareBtn.innerText = "⬇️ تم مشاركة الصورة بنجاح!";
            setTimeout(() => {
              shareBtn.style.backgroundColor = "";
              shareBtn.innerText = originalText;
              shareBtn.disabled = false;
            }, 5000);
          }
        } catch (error) {
          shareBtn.innerText = originalText;
          shareBtn.disabled = false;
          alert("حدث خطأ أثناء تحضير الصورة");
        }
      }

      function getGrade() {
        var id = document.getElementById("nationalId").value;
        var resultDiv = document.getElementById("result");
        var loader = document.getElementById("loader");
        var searchBtn = document.getElementById("searchBtn");

        resultDiv.innerHTML = "";

        if (!id) {
          resultDiv.innerHTML =
            "<div style='color:red; margin-top:15px;' class='student-info-appear'>الرجاء إدخال الرقم القومي أولاً</div>";
          return;
        }

        loader.style.display = "block";
        searchBtn.disabled = true;
        searchBtn.innerText = "جاري البحث...";

        var url =
          "https://script.google.com/macros/s/AKfycbzKxXdxfG1hFI135i0C3EBJOGxBvYvDuyP3uEqWo7dljWMRo1y1c-6sn1_6TN-GGDWL/exec?id=" +
          id;

        fetch(url)
          .then((response) => response.json())
          .then((data) => {
            loader.style.display = "none";
            searchBtn.disabled = false;
            searchBtn.innerText = "بحث";

            if (data.status === "success") {
              var ar = checkEmpty(data.arabic),
                ar_max = checkEmpty(data.arabic_max);
              var en = checkEmpty(data.english),
                en_max = checkEmpty(data.english_max);
              var sc = checkEmpty(data.science),
                sc_max = checkEmpty(data.science_max);
              var ma = checkEmpty(data.math),
                ma_max = checkEmpty(data.math_max);
              var total = checkEmpty(data.total),
                total_max = checkEmpty(data.total_max);
              var perc = checkEmpty(data.percentage);
              var displayPerc = perc !== "-" ? perc + "%" : "-";

              var statusMessageHtml = "";
              var numericPerc = parseFloat(perc);

              if (!isNaN(numericPerc)) {
                if (numericPerc >= 50) {
                  statusMessageHtml = `<div class="status-message congrats-message">تتقدم إدارة مدرسة الشهيد محمود علي الخطيب بخالص التهاني بالنجاح والتفوق 🏆</div>`;
                  confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 },
                    zIndex: 9999,
                  });
                  showEmojis(true);
                } else {
                  statusMessageHtml = `<div class="status-message fail-message">حظ أوفر، نتمنى منك أن تجتهد أكثر في المرة القادمة</div>`;
                  showEmojis(false);
                }
              }

              var html = `
                <div class="student-info-appear">
                    <div id="capture-area">
                        <div id="export-header" style="display: none;">
                            <div style="display: flex; justify-content: center; align-items: center; margin-bottom: 25px; width: 100%; gap: 30px;">
                                <img src="logo_2.webp" crossorigin="anonymous" style="height: 140px; width: auto; object-fit: contain;" />
                                <img src="logo_1.webp" crossorigin="anonymous" style="height: 140px; width: auto; object-fit: contain;" />
                            </div>
                            <h4 style="color: #4a4e69; margin-top: 0; margin-bottom: 25px; border-bottom: 2px dashed #eee; padding-bottom: 15px; font-size: 22px;">مدرسة الشهيد محمود علي الخطيب الرسمية للغات</h4>
                        </div>

                        <h3 style="color:#8f250c; margin-top:10px;">الاسم: ${data.name}</h3>
                        <table>
                            <tr><th>المادة</th><th>الدرجة النهائية</th><th>درجة الطالب</th></tr>
                            <tr><td>اللغة العربية</td><td>${ar_max}</td><td>${ar}</td></tr>
                            <tr><td>اللغة الإنجليزية</td><td>${en_max}</td><td>${en}</td></tr>
                            <tr><td>العلوم</td><td>${sc_max}</td><td>${sc}</td></tr>
                            <tr><td>الرياضيات</td><td>${ma_max}</td><td>${ma}</td></tr>
                            <tr class="total-row"><td>المجموع الكلي</td><td>${total_max}</td><td>${total}</td></tr>
                        </table>
                        <div class="percentage">النسبة المئوية: ${displayPerc}</div>
                        ${statusMessageHtml}
                        
                        <div id="export-footer" style="display: none; margin-top: 30px; font-size: 16px; color: #4a4e69; text-align: center; font-weight: bold; border-top: 2px solid #eee; padding-top: 15px;">تصميم وتنفيذ : سمير هلال</div>
                    </div>
                    
                    <button id="shareBtn" class="form-control btn-share" onclick="shareResult('${data.name}')">📸 مشاركة النتيجة كصورة</button>

                    <div class="feedback-section">
                        <button id="showFeedbackBtn" class="form-control pulse-button" onclick="toggleFeedbackForm()">إضافة رأي أو مقترح</button>
                        <div id="feedbackFormContainer" style="display: none; text-align: center;">
                            <h4 id="feedbackTitle" style="color: #333; margin-bottom: 15px; font-size: 18px;">سجل رأيك أو مقترحاتك:</h4>
                            <textarea id="feedbackInput" rows="3" placeholder="اكتب رسالتك هنا..." lang="ar" dir="rtl"></textarea>
                            <button id="submitFeedbackBtn" class="form-control btn-success" onclick="sendFeedback('${data.name}', '${id}')">إرسال الاقتراح</button>
                            <div id="feedbackStatus" style="margin-top: 10px; font-weight: bold; text-align: center;"></div>
                        </div>
                    </div>
                </div>`;
              resultDiv.innerHTML = html;
            } else {
              resultDiv.innerHTML = `<div style='color:red; margin-top:15px;' class='student-info-appear'>${data.message}</div>`;
            }

            setTimeout(() => {
              window.scrollTo({
                top: document.body.scrollHeight,
                behavior: "smooth",
              });
            }, 100);
          })
          .catch((error) => {
            loader.style.display = "none";
            searchBtn.disabled = false;
            searchBtn.innerText = "بحث";
            resultDiv.innerHTML =
              "<div style='color:red; margin-top:15px;' class='student-info-appear'>حدث خطأ في الاتصال بقاعدة البيانات.</div>";
          });
      }
    </script>
  </body>
</html>
