<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نتيجة الطلاب - مدرسة الشهيد محمود علي الخطيب</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=El+Messiri:wght@400..700&display=swap");

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        margin: 0;
        padding: 40px 20px;
        background-color: #f0f2f5;
        animation: fadeInPage 1s ease-out;
        overflow-x: hidden;
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 15px;
        width: 100%;
        max-width: 750px;
        margin: 0 auto;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        animation: slideInUp 0.8s ease-out;
        position: relative;
        z-index: 10;
      }

      .top-logos {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 15px;
        width: 100%;
        gap: 20px;
      }

      .top-logos img {
        max-height: 130px;
        width: auto;
      }

      .header-image {
        text-align: center;
        margin-bottom: 25px;
        padding: 0 10px;
      }

      .header-image img {
        width: 100%;
        max-width: 580px;
        height: auto;
      }

      h2 {
        color: #0056b3;
        margin-top: 10px;
        margin-bottom: 20px;
        font-size: 24px;
      }

      .warning-text {
        font-size: 14px;
        color: #e63946;
        margin-bottom: 8px;
        font-weight: bold;
      }

      .form-control {
        font-size: 16px;
        padding: 12px 15px;
        border-radius: 8px;
      }

      input,
      textarea {
        width: 100%;
        margin: 0 0 15px 0;
        border: 2px solid #e1e1e1;
        transition: all 0.3s ease;
        font-family: inherit;
      }

      input {
        direction: ltr;
        text-align: center;
      }

      textarea {
        resize: vertical;
        padding: 12px 15px;
        border-radius: 8px;
      }

      input:focus,
      textarea:focus {
        border-color: #0056b3;
        box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        outline: none;
      }

      button {
        background-color: #0056b3;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      button:hover {
        background-color: #004494;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      button:active {
        transform: translateY(1px);
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      #result:not(:empty) {
        margin-top: 20px;
      }

      .student-info-appear {
        animation: fadeIn 0.5s ease-out forwards;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
        background-color: white;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #eee;
        animation: tableAppear 0.8s ease-out forwards;
        opacity: 0;
      }

      th,
      td {
        border: 1px solid #eee;
        padding: 15px;
        text-align: center;
      }

      th {
        background-color: #0056b3;
        color: white;
        font-weight: 600;
      }

      tr:nth-child(even) {
        background-color: #fbfbfb;
      }

      .total-row {
        font-weight: bold;
        background-color: #bcb8b1 !important;
      }

      .percentage {
        font-size: 22px;
        font-weight: bold;
        color: #0056b3;
        margin-top: 25px;
        text-align: center;
        border-top: 2px dashed #eee;
        padding-top: 15px;
        animation: fadeIn 0.5s ease-out 0.5s forwards;
        opacity: 0;
      }

      .status-message {
        padding: 12px;
        border-radius: 8px;
        margin-top: 20px;
        font-size: 16px;
        font-weight: bold;
        animation: fadeIn 0.5s ease-out 0.8s forwards;
        opacity: 0;
      }

      .congrats-message {
        background-color: #008000;
        color: #f2e8cf;
        border: 1px solid #c3e6cb;
      }

      .fail-message {
        background-color: #b23a48;
        color: #fed0bb;
        border: 1px solid #f5c6cb;
      }

      .feedback-section {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 2px dashed #eee;
        animation: fadeIn 0.5s ease-out 1s forwards;
        opacity: 0;
      }

      .btn-success {
        background-color: #28a745;
      }

      .btn-success:hover {
        background-color: #218838;
      }

      .loader {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #0056b3;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
        display: none;
      }

      .designer-credit {
        margin-top: 15px;
        font-size: 13px;
        color: #4a4e69;
        text-align: center;
        font-weight: bold;
      }

      .falling-emoji {
        position: fixed;
        top: -50px;
        font-size: 35px;
        z-index: 9999;
        pointer-events: none;
        animation: floatDown linear forwards;
      }

      @keyframes floatDown {
        0% {
          transform: translateY(0) rotate(0deg) translateX(0);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(105vh) rotate(45deg) translateX(20px);
          opacity: 0;
        }
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      @keyframes fadeInPage {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes tableAppear {
        from {
          opacity: 0;
          transform: scaleY(0.9);
          transform-origin: top;
        }
        to {
          opacity: 1;
          transform: scaleY(1);
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 20px 10px;
        }
        .container {
          padding: 25px 20px;
          border-radius: 10px;
        }
        .top-logos {
          margin-bottom: 15px;
        }
        .top-logos img {
          max-height: 110px;
        }
        .header-image {
          margin-bottom: 15px;
          padding: 0;
        }
        h2 {
          font-size: 24px;
          margin-bottom: 15px;
          margin-top: 10px;
        }
        .warning-text {
          font-size: 14px;
        }
        th,
        td {
          padding: 10px;
          font-size: 14px;
        }
        .form-control {
          font-size: 16px;
          padding: 12px 15px;
        }
        .percentage {
          font-size: 20px;
        }
        .status-message {
          font-size: 14px;
        }
        .designer-credit {
          font-size: 12px;
          margin-top: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top-logos">
        <img src="logo_2.webp" alt="شعار وزارة التربية والتعليم" />
        <img src="logo_1.webp" alt="شعار مدرسة الشهيد محمود علي الخطيب" />
      </div>

      <div class="header-image">
        <img
          src="logo_3.webp"
          alt="مدرسة الشهيد محمود علي الخطيب الرسمية للغات - مدير المدرسة: سمير هلال"
        />
      </div>

      <h2>استعلام عن النتيجة</h2>

      <input
        type="text"
        inputmode="numeric"
        maxlength="14"
        id="nationalId"
        class="form-control"
        placeholder="أدخل الرقم القومي للطالب"
        oninput="this.value = this.value.replace(/[^0-9]/g, '')"
      />
      <button onclick="getGrade()" id="searchBtn" class="form-control">
        بحث
      </button>

      <div class="loader" id="loader"></div>

      <div id="result"></div>

      <div class="designer-credit">تصميم وتنفيذ : سمير هلال</div>
    </div>

    <script>
      document
        .getElementById("nationalId")
        .addEventListener("keypress", function (event) {
          if (event.key === "Enter") {
            event.preventDefault();
            getGrade();
          }
        });

      function checkEmpty(value) {
        if (value === "" || value === null || value === undefined) {
          return "-";
        }
        return value;
      }

      function showEmojis(isSuccess) {
        const happyEmojis = ["🥳", "😄", "👏", "🏆", "🎉", "😘"];
        const sadEmojis = ["😥", "😭", "☹️", "😣", "😓"];
        const emojisToUse = isSuccess ? happyEmojis : sadEmojis;
        const emojiCount = 15;

        for (let i = 0; i < emojiCount; i++) {
          setTimeout(() => {
            const emoji = document.createElement("div");
            emoji.classList.add("falling-emoji");

            const randomEmoji =
              emojisToUse[Math.floor(Math.random() * emojisToUse.length)];
            emoji.innerText = randomEmoji;

            emoji.style.left = Math.random() * 100 + "vw";
            emoji.style.animationDuration = Math.random() * 3 + 4 + "s";

            document.body.appendChild(emoji);

            setTimeout(() => {
              emoji.remove();
            }, 7000);
          }, i * 150);
        }
      }

      function toggleFeedbackForm() {
        document.getElementById("showFeedbackBtn").style.display = "none";
        var formContainer = document.getElementById("feedbackFormContainer");
        formContainer.style.display = "block";
        formContainer.style.animation = "fadeIn 0.5s ease-out forwards";

        setTimeout(() => {
          window.scrollTo({
            top: document.body.scrollHeight,
            behavior: "smooth",
          });
          document.getElementById("feedbackInput").focus();
        }, 100);
      }

      function sendFeedback(studentName, studentId) {
        var feedbackText = document.getElementById("feedbackInput").value;
        var btn = document.getElementById("submitFeedbackBtn");
        var statusMsg = document.getElementById("feedbackStatus");

        if (!feedbackText.trim()) {
          statusMsg.innerHTML =
            "<span style='color: red;'>الرجاء كتابة رأيك أولاً.</span>";
          return;
        }

        btn.disabled = true;
        btn.innerText = "جاري الإرسال...";
        statusMsg.innerHTML = "";

        fetch("https://formsubmit.co/ajax/samirhelal2298@gmail.com", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Accept: "application/json",
          },
          body: JSON.stringify({
            _subject: "اقتراح جديد من موقع النتيجة",
            "اسم الطالب": studentName,
            "الرقم القومي": studentId,
            "الرأي أو المقترح": feedbackText,
          }),
        })
          .then((response) => response.json())
          .then((data) => {
            btn.innerText = "تم الإرسال بنجاح!";
            statusMsg.innerHTML =
              "<span style='color: green;'>شكراً لك! تم إرسال رسالتك للإدارة.</span>";
            document.getElementById("feedbackInput").value = "";
          })
          .catch((error) => {
            btn.disabled = false;
            btn.innerText = "إرسال الاقتراح";
            statusMsg.innerHTML =
              "<span style='color: red;'>حدث خطأ، يرجى المحاولة لاحقاً.</span>";
          });
      }

      function getGrade() {
        var id = document.getElementById("nationalId").value;
        var resultDiv = document.getElementById("result");
        var loader = document.getElementById("loader");
        var searchBtn = document.getElementById("searchBtn");

        resultDiv.innerHTML = "";

        if (!id) {
          resultDiv.innerHTML =
            "<div style='color:red; margin-top:15px;' class='student-info-appear'>الرجاء إدخال الرقم القومي أولاً</div>";
          return;
        }

        loader.style.display = "block";
        searchBtn.disabled = true;
        searchBtn.innerText = "جاري البحث...";

        var url =
          "https://script.google.com/macros/s/AKfycbzN5ThU8Z-Fr0qcwFiPWB4ixSsxqREfLgvgLY_LMqoHg5OwlOs0HtEXsi1NTDo8i-_x/exec?id=" +
          id;

        fetch(url)
          .then((response) => response.json())
          .then((data) => {
            loader.style.display = "none";
            searchBtn.disabled = false;
            searchBtn.innerText = "بحث";

            if (data.status === "success") {
              var ar = checkEmpty(data.arabic);
              var ar_max = checkEmpty(data.arabic_max);
              var en = checkEmpty(data.english);
              var en_max = checkEmpty(data.english_max);
              var sc = checkEmpty(data.science);
              var sc_max = checkEmpty(data.science_max);
              var ma = checkEmpty(data.math);
              var ma_max = checkEmpty(data.math_max);
              var total = checkEmpty(data.total);
              var total_max = checkEmpty(data.total_max);
              var perc = checkEmpty(data.percentage);

              var displayPerc = perc !== "-" ? perc + "%" : "-";

              var statusMessageHtml = "";
              var numericPerc = parseFloat(perc);

              if (!isNaN(numericPerc)) {
                if (numericPerc >= 50) {
                  statusMessageHtml = `<div class="status-message congrats-message">تتقدم إدارة مدرسة الشهيد محمود علي الخطيب بخالص التهاني بالنجاح والتفوق 🏆</div>`;

                  confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 },
                    zIndex: 9999,
                  });

                  showEmojis(true);
                } else {
                  statusMessageHtml = `<div class="status-message fail-message">حظ أوفر، نتمنى منك أن تجتهد أكثر في المرة القادمة</div>`;

                  showEmojis(false);
                }
              }

              var html = `
                <div class="student-info-appear">
                    <h3 style="color:#8f250c; margin-top:20px;">الاسم: ${data.name}</h3>
                    <table>
                        <tr>
                            <th>المادة</th>
                            <th>الدرجة النهائية</th>
                            <th>درجة الطالب</th>
                        </tr>
                        <tr><td>اللغة العربية</td><td>${ar_max}</td><td>${ar}</td></tr>
                        <tr><td>اللغة الإنجليزية</td><td>${en_max}</td><td>${en}</td></tr>
                        <tr><td>العلوم</td><td>${sc_max}</td><td>${sc}</td></tr>
                        <tr><td>الرياضيات</td><td>${ma_max}</td><td>${ma}</td></tr>
                        <tr class="total-row"><td>المجموع الكلي</td><td>${total_max}</td><td>${total}</td></tr>
                    </table>
                    <div class="percentage">النسبة المئوية: ${displayPerc}</div>
                    ${statusMessageHtml}
                    
                    <div class="feedback-section">
                        <button id="showFeedbackBtn" class="form-control" onclick="toggleFeedbackForm()">إضافة رأي أو مقترح</button>
                        <div id="feedbackFormContainer" style="display: none; text-align: right;">
                            <h4 style="color: #333; margin-bottom: 15px; font-size: 18px;">سجل رأيك أو مقترحاتك:</h4>
                            <textarea id="feedbackInput" rows="3" placeholder="اكتب رسالتك هنا..."></textarea>
                            <button id="submitFeedbackBtn" class="form-control btn-success" onclick="sendFeedback('${data.name}', '${id}')">إرسال الاقتراح</button>
                            <div id="feedbackStatus" style="margin-top: 10px; font-weight: bold; text-align: center;"></div>
                        </div>
                    </div>
                </div>
              `;
              resultDiv.innerHTML = html;
            } else {
              resultDiv.innerHTML = `<div style='color:red; margin-top:15px;' class='student-info-appear'>${data.message}</div>`;
            }

            setTimeout(() => {
              window.scrollTo({
                top: document.body.scrollHeight,
                behavior: "smooth",
              });
            }, 100);
          })
          .catch((error) => {
            loader.style.display = "none";
            searchBtn.disabled = false;
            searchBtn.innerText = "بحث";
            resultDiv.innerHTML =
              "<div style='color:red; margin-top:15px;' class='student-info-appear'>حدث خطأ في الاتصال بقاعدة البيانات. تأكد من الإنترنت.</div>";
          });
      }
    </script>
  </body>
</html>
