<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بوابة شئون العاملين - مدرسة الخطيب</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Cairo", sans-serif;
      text-align: center; margin: 0; padding: 20px;
      background-color: #c9d0d9; animation: fadeInPage 0.55s ease-out;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; overflow-x: hidden;
    }
    @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.85); } 70% { transform: scale(1.04); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes floatDot { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-18px); } }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    
    .dot {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      background: rgba(0, 86, 179, 0.05); animation: floatDot ease-in-out infinite;
    }
    .container {
      background: white; padding: 30px; border-radius: 15px; width: 100%;
      max-width: 800px; margin: 0 auto; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      animation: slideInUp 0.8s ease-out; position: relative; z-index: 10;
    }
    .top-logos { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
    .top-logos img { max-height: 100px; max-width: 45%; object-fit: contain; }
    h2 { color: #0056b3; margin: 10px 0 20px; font-size: 24px; font-weight: 800; }
    
    .form-control {
      font-size: 16px; padding: 12px 15px; border-radius: 11px; display: block;
      width: 100%; max-width: 400px; margin: 0 auto 15px auto;
      border: 2px solid #e1e1e1; text-align: center; transition: all 0.3s ease; font-family: inherit;
    }
    .form-control:focus { border-color: #0056b3; box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1); outline: none; }
    .form-control:disabled { background-color: #f5f5f5; cursor: not-allowed; color: #999; }
    
    button {
      background-color: #0056b3; color: white; border: none; cursor: pointer;
      font-weight: bold; width: 100%; max-width: 400px; margin: 0 auto; padding: 12px;
      border-radius: 11px; display: block; transition: 0.2s; font-family: inherit; font-size: 16px;
    }
    button:hover:not(:disabled) { background-color: #004494; transform: translateY(-2px); }
    button:disabled { background-color: #6c757d !important; cursor: not-allowed; }
    
    .btn-today { background-color: #4a4e69; width: auto; margin: 0; padding: 10px 15px; font-size: 14px; }
    .btn-today:hover:not(:disabled) { background-color: #22223b; }

    .status-message { padding: 12px; border-radius: 8px; margin-top: 15px; font-weight: bold; display: none; animation: popIn 0.3s ease; }
    .success-msg { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error-msg { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #0056b3; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
    
    .header-actions { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
    .user-name-display { font-weight: bold; color: #0056b3; }
    .btn-logout { background-color: #dc3545; max-width: 120px; padding: 6px; font-size: 14px; margin:0; }

    .dual-search { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
    .dual-search > div, .dual-search > select { flex: 1; min-width: 250px; max-width: 100%; margin: 0; }
    .search-container { position: relative; }
    .autocomplete-items {
      position: absolute; border: 1px solid #d4d4d4; border-bottom: none; border-top: none; z-index: 99;
      top: 100%; left: 0; right: 0; max-height: 250px; overflow-y: auto;
      border-radius: 0 0 11px 11px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background-color: #fff; text-align: right;
    }
    .autocomplete-items div { padding: 10px; cursor: pointer; background-color: #fff; border-bottom: 1px solid #d4d4d4; font-size: 15px; color: #333; }
    .autocomplete-items div:hover, .autocomplete-active { background-color: #eef4ff !important; color: #0056b3 !important; font-weight: bold; }
    
    .action-card { background: #f8f9fa; border: 1px solid #e1e1e1; border-radius: 12px; padding: 20px; margin-top: 20px; display: none; animation: popIn 0.4s ease; text-align: right; }
    .action-card h3 { margin-top: 0; color: #333; font-size: 18px; border-bottom: 2px solid #0056b3; padding-bottom: 8px; display: inline-block;}
    .dynamic-area { margin-top: 15px; padding: 15px; background: white; border-radius: 8px; border: 1px dashed #ccc; }
    .time-input-group { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; direction: rtl; }
    
    .radio-group { margin-bottom: 15px; text-align: center; }
    .radio-group label { margin: 0 10px; font-weight: bold; cursor: pointer; }
    .radio-group input { accent-color: #0056b3; transform: scale(1.2); margin-left: 5px; }

    .date-row { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
    
    .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 15px; direction: rtl;}
    .day-checkbox { background: #eef4ff; padding: 10px; border-radius: 6px; display: flex; align-items: center; gap: 8px; border: 1px solid #cce0ff; cursor: pointer;}
    .day-checkbox input { margin: 0; width: 18px; height: 18px; accent-color: #0056b3;}
    
    .stats-container { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; }
    .circle-wrapper { width: 120px; position: relative; text-align: center; }
    .circular-chart { display: block; margin: 0 auto; max-width: 100%; max-height: 250px; }
    .circle-bg { fill: none; stroke: #eee; stroke-width: 3.8; }
    .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; transition: stroke-dasharray 1s ease-out; }
    .percentage { fill: #333; font-family: "Cairo"; font-size: 8px; font-weight: bold; text-anchor: middle; }
    .circle-label { margin-top: 10px; font-weight: bold; font-size: 14px; color: #4a4e69; }
    .color-green .circle { stroke: #28a745; } .color-blue .circle { stroke: #0056b3; } .color-orange .circle { stroke: #fd7e14; }
    .timeline { border-right: 3px solid #0056b3; padding-right: 20px; text-align: right; margin-top: 20px; }
    .timeline-item { position: relative; margin-bottom: 20px; background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #eee;}
    .timeline-item::before { content: ''; position: absolute; right: -29px; top: 15px; width: 16px; height: 16px; border-radius: 50%; background: #0056b3; border: 3px solid white; box-shadow: 0 0 0 1px #0056b3; }
    .timeline-date { font-size: 12px; color: #888; font-weight: bold; margin-bottom: 5px; }
    .timeline-title { font-size: 16px; font-weight: bold; color: #333; }
    .timeline-notes { font-size: 14px; color: #666; margin-top: 5px; }

    @media (max-width: 480px) { .circle-wrapper { width: 100px; } .dual-search { flex-direction: column; } .date-row { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="dot" style="width: 90px; height: 90px; top: 8%; left: 4%; animation-duration: 6s;"></div>
  <div class="dot" style="width: 120px; height: 120px; top: 55%; left: 2%; animation-duration: 10s;"></div>

  <div class="container" id="loginContainer">
    <div class="top-logos">
      <img src="https://mosamirhelal.com/alkhateeb/logo_2.webp" alt="وزارة التربية" />
      <img src="https://mosamirhelal.com/alkhateeb/logo_1.webp" alt="شعار المدرسة" />
    </div>
    <h2>تسجيل الدخول للنظام</h2>
    
    <div id="inputsWrapper">
      <input type="text" id="usernameInput" class="form-control" placeholder="اسم المستخدم" />
      <input type="password" id="passwordInput" class="form-control" placeholder="كلمة المرور" onkeydown="if(event.key === 'Enter') doLogin()" dir="ltr" />
    </div>

    <button id="loginBtn" onclick="doLogin()">دخول المنصة</button>
    <div class="loader" id="loginLoader"></div>
    <div id="loginMessage" class="status-message"></div>
  </div>

  <div class="container" id="adminContainer" style="display: none;">
    <div class="header-actions">
      <span class="user-name-display" id="adminNameDisplay"></span>
      <button class="btn-logout" onclick="executeLogout()">تسجيل خروج</button>
    </div>
    <h2>تسجيل الحضور والغياب</h2>
    
    <div class="dual-search">
      <div class="search-container">
        <input type="text" id="adminSearchInput" class="form-control" placeholder="ابحث باسم المعلم أو الكود..." oninput="handleLiveSearch()" onfocus="this.select()" onclick="this.select()" autocomplete="off" style="margin-bottom:0;" />
        <div id="searchResults" class="autocomplete-items" style="display: none;"></div>
      </div>
      <select id="adminTeacherSelect" class="form-control" onchange="selectTeacherFromDropdown()">
        <option value="">-- أو اختر من القائمة --</option>
      </select>
    </div>

    <div class="action-card" id="actionCard">
      <h3 id="selectedTeacherName"></h3>
      <input type="hidden" id="selectedTeacherCode" />
      <input type="hidden" id="selectedTeacherStart" />

      <select id="actionTypeSelect" class="form-control" style="max-width: 100%;" onchange="handleActionTypeChange()">
        <option value="">-- اختر الإجراء --</option>
        <option value="تأخر صباحي">تأخر صباحي</option>
        <option value="تأخر بإذن">تأخر بإذن</option>
        <option value="غياب">غياب</option>
        <option value="غياب بعذر">غياب بعذر</option>
        <option value="اعتيادي">إجازة اعتيادي</option>
        <option value="مرضي">إجازة مرضي</option>
        <option value="خروج بدون إذن">خروج بدون إذن</option>
        <option value="خروج بإذن">خروج بإذن</option>
        <option value="إذن صباحي">إذن صباحي</option>
      </select>

      <div id="dynamicArea" class="dynamic-area" style="display: none;">
        <div id="timeCalcArea" style="display: none;">
          <div class="time-input-group">
            <span style="font-weight:bold;">وقت الإجراء:</span>
            <input type="time" id="actionTimeInput" class="form-control" style="width:130px; margin:0; direction: ltr;" onchange="calculateDelay()" />
            <button onclick="setNowTime()" style="width:auto; margin:0; padding:10px;">الآن</button>
          </div>
          <div id="delayResultArea" class="time-input-group" style="display:none; background: #fff0f0; padding: 10px; border-radius: 8px;">
            <span style="font-weight:bold; color: #dc3545;">التأخير (بالدقائق):</span>
            <input type="number" id="manualDelayInput" class="form-control" style="width:80px; margin:0; border-color: #dc3545; color: #dc3545; font-weight: bold; text-align: center; direction: ltr;" min="0" />
          </div>
        </div>

        <div id="dateSelectArea" style="display: none;">
          <div class="radio-group">
            <label><input type="radio" name="dateMode" value="single" checked onchange="toggleDateMode()"> تسجيل يوم واحد</label>
            <label><input type="radio" name="dateMode" value="multiple" onchange="toggleDateMode()"> تسجيل عدة أيام</label>
          </div>

          <div id="singleDayArea">
            <div class="date-row">
              <label style="font-weight:bold;">التاريخ:</label>
              <input type="date" id="singleDateInput" class="form-control" style="max-width:200px; margin:0;" />
              <button onclick="setToday('singleDateInput')" class="btn-today">اليوم</button>
            </div>
          </div>

          <div id="multipleDaysArea" style="display: none;">
            <div class="date-row">
              <label style="font-weight:bold;">البداية:</label>
              <input type="date" id="startDateInput" class="form-control" style="max-width:150px; margin:0;" onchange="generateCheckboxes()" />
              <button onclick="setToday('startDateInput')" class="btn-today">اليوم</button>
              
              <label style="font-weight:bold; margin-right: 15px;">النهاية:</label>
              <input type="date" id="endDateInput" class="form-control" style="max-width:150px; margin:0;" onchange="generateCheckboxes()" />
              <button onclick="setToday('endDateInput')" class="btn-today">اليوم</button>
            </div>
            
            <div id="selectAllContainer" style="display:none; text-align:right; margin-top:15px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
              <label style="font-weight:bold; cursor:pointer; color:#0056b3;">
                <input type="checkbox" id="selectAllDays" checked onchange="toggleAllDays(this.checked)" style="accent-color:#0056b3; transform:scale(1.2); margin-left:5px;">
                تحديد جميع الأيام
              </label>
            </div>
            
            <div id="checkboxesContainer" class="checkbox-grid"></div>
          </div>
        </div>

        <input type="text" id="actionNotes" class="form-control" style="max-width: 100%; margin-top:15px;" placeholder="ملاحظات (اختياري)..." />
        <button id="saveActionBtn" style="background-color: #28a745;" onclick="saveAttendance()">تسجيل وحفظ</button>
      </div>
    </div>
    
    <div class="loader" id="adminLoader"></div>
    <div id="adminMessage" class="status-message"></div>
  </div>

  <div class="container" id="teacherContainer" style="display: none;">
    <div class="header-actions">
      <span class="user-name-display" id="teacherNameDisplay"></span>
      <button class="btn-logout" onclick="executeLogout()">تسجيل خروج</button>
    </div>
    <h2>لوحة إحصائيات المعلم</h2>

    <div class="stats-container">
      <div class="circle-wrapper color-green">
        <svg viewBox="0 0 36 36" class="circular-chart">
          <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <path class="circle" id="circleAttendance" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <text x="18" y="20.35" class="percentage" id="textAttendance">0%</text>
        </svg>
        <div class="circle-label">معدل الحضور</div>
      </div>
      <div class="circle-wrapper color-blue">
        <svg viewBox="0 0 36 36" class="circular-chart">
          <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <path class="circle" id="circleCasual" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <text x="18" y="20.35" class="percentage" id="textCasual">0</text>
        </svg>
        <div class="circle-label">رصيد اعتيادي</div>
      </div>
      <div class="circle-wrapper color-orange">
        <svg viewBox="0 0 36 36" class="circular-chart">
          <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <path class="circle" id="circleLate" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <text x="18" y="20.35" class="percentage" id="textLate">0ق</text>
        </svg>
        <div class="circle-label">دقائق التأخير</div>
      </div>
    </div>

    <h3 style="text-align: right; color:#0056b3; border-bottom: 2px solid #eee; padding-bottom: 10px;">سجل الحركات الأخير</h3>
    <div id="teacherTimeline" class="timeline"></div>
    <div class="loader" id="teacherLoader"></div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxvjnNdq03xb8Koa422VmqbLZbVFG_e8OWaQHLC1PEtCcNcR0BmKkLSBnnKXyUURv9IA/exec";
    let allTeachers = []; 
    let currentSearchFocus = -1;

    window.onload = function () { checkAuth(); };

    function checkAuth() {
      const authData = localStorage.getItem("alkhateeb_hr_auth");
      if (authData) {
        const auth = JSON.parse(authData);
        document.getElementById("loginContainer").style.display = "none";
        
        if (auth.role === "Admin") {
          document.getElementById("adminContainer").style.display = "block";
          document.getElementById("adminNameDisplay").innerText = "أهلاً بك: " + auth.name;
          
          const cachedTeachers = localStorage.getItem("alkhateeb_teachers");
          if(cachedTeachers) { 
            allTeachers = JSON.parse(cachedTeachers);
            populateDropdown();
          }
          
          fetchTeachersList(auth.token, false);
        } else {
          document.getElementById("teacherContainer").style.display = "block";
          document.getElementById("teacherNameDisplay").innerText = "أهلاً بك: " + auth.name;
          fetchTeacherStats(auth.token);
        }
      } else {
        document.getElementById("loginContainer").style.display = "block";
        document.getElementById("inputsWrapper").style.display = "block";
        document.getElementById("adminContainer").style.display = "none";
        document.getElementById("teacherContainer").style.display = "none";
      }
    }

    function doLogin() {
      const userInput = document.getElementById("usernameInput");
      const passInput = document.getElementById("passwordInput");
      const user = userInput.value.trim();
      const pass = passInput.value.trim();
      const msgDiv = document.getElementById("loginMessage");
      const btn = document.getElementById("loginBtn");
      const loader = document.getElementById("loginLoader");
      const inputsWrapper = document.getElementById("inputsWrapper");

      if (!user || !pass) { showMsg(msgDiv, "يرجى إدخال البيانات.", true); return; }
      
      userInput.disabled = true;
      passInput.disabled = true;
      btn.disabled = true; 
      loader.style.display = "block"; 
      msgDiv.style.display = "none";
      btn.innerText = "جاري التحقق...";

      fetch(APPS_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ action: "login", username: user, password: pass })
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
          inputsWrapper.style.display = "none";
          showMsg(msgDiv, "تم التسجيل بنجاح", false);
          btn.innerText = "جاري جلب البيانات...";

          localStorage.setItem("alkhateeb_hr_auth", JSON.stringify({ token: data.token, name: data.name, role: data.role }));
          
          if (data.role === "Admin") {
            fetchTeachersList(data.token, true);
          } else {
            setTimeout(() => {
              loader.style.display = "none"; 
              btn.disabled = false;
              btn.innerText = "دخول المنصة";
              checkAuth();
            }, 800);
          }
        } else {
          userInput.disabled = false;
          passInput.disabled = false;
          loader.style.display = "none"; 
          btn.disabled = false;
          btn.innerText = "دخول المنصة";
          showMsg(msgDiv, data.message, true);
        }
      }).catch(err => {
        userInput.disabled = false;
        passInput.disabled = false;
        loader.style.display = "none"; 
        btn.disabled = false;
        btn.innerText = "دخول المنصة";
        showMsg(msgDiv, "خطأ في الاتصال بالخادم.", true);
      });
    }

    function executeLogout() {
      localStorage.removeItem("alkhateeb_hr_auth");
      localStorage.removeItem("alkhateeb_teachers");
      location.reload();
    }

    function showMsg(element, text, isError) {
      element.innerText = text;
      element.className = isError ? "status-message error-msg" : "status-message success-msg";
      element.style.display = "block";
      setTimeout(() => element.style.display = "none", 4000);
    }

    function fetchTeachersList(token, fromLogin = false) {
      const loader = document.getElementById("adminLoader");
      if(!fromLogin && allTeachers.length === 0) loader.style.display = "block";
      
      fetch(APPS_SCRIPT_URL, {
        method: "POST", body: JSON.stringify({ action: "getTeachersList", token: token })
      }).then(res => res.json()).then(data => {
        loader.style.display = "none";
        if (data.status === "success") {
          allTeachers = data.teachers;
          localStorage.setItem("alkhateeb_teachers", JSON.stringify(allTeachers));
          populateDropdown();
          
          if(fromLogin) {
            document.getElementById("loginLoader").style.display = "none";
            document.getElementById("loginBtn").disabled = false;
            document.getElementById("loginBtn").innerText = "دخول المنصة";
            checkAuth(); 
          }
        } else if(data.message.includes("منتهية")) { executeLogout(); }
      }).catch(err => {
        if(fromLogin) {
          document.getElementById("loginLoader").style.display = "none";
          document.getElementById("loginBtn").disabled = false;
          document.getElementById("loginBtn").innerText = "دخول المنصة";
          checkAuth(); 
        }
      });
    }

    function populateDropdown() {
      const select = document.getElementById("adminTeacherSelect");
      select.innerHTML = '<option value="">-- أو اختر من القائمة --</option>';
      allTeachers.forEach(t => {
        let opt = document.createElement("option");
        opt.value = t.code; 
        opt.innerText = t.name + " (" + t.code + ")";
        select.appendChild(opt);
      });
    }

    function handleLiveSearch() {
      const term = document.getElementById("adminSearchInput").value.trim().toLowerCase();
      const resultsContainer = document.getElementById("searchResults");
      resultsContainer.innerHTML = "";
      currentSearchFocus = -1;

      if (term.length === 0) {
        resultsContainer.style.display = "none";
        document.getElementById("actionCard").style.display = "none";
        return;
      }

      const filtered = allTeachers.filter(t => 
        t.name.toLowerCase().includes(term) || String(t.code).includes(term)
      );

      if (filtered.length === 0) {
        resultsContainer.innerHTML = "<div style='padding:10px; color:#888;'>لا توجد نتائج</div>";
        resultsContainer.style.display = "block";
        return;
      }

      filtered.forEach(t => {
        let item = document.createElement("div");
        item.innerHTML = `<strong>${t.name}</strong> <span style="color:#888; font-size:13px;">(كود: ${t.code})</span>`;
        item.onclick = function() {
          resultsContainer.style.display = "none";
          selectTeacherByCode(t.code);
        };
        resultsContainer.appendChild(item);
      });
      resultsContainer.style.display = "block";
    }

    document.getElementById("adminSearchInput").addEventListener("keydown", function(e) {
      const resultsContainer = document.getElementById("searchResults");
      if (resultsContainer.style.display === "none") return;
      let items = resultsContainer.getElementsByTagName("div");
      if (!items || items.length === 0) return;

      if (e.key === "ArrowDown") {
        currentSearchFocus++;
        addActiveSearchItem(items);
      } else if (e.key === "ArrowUp") {
        currentSearchFocus--;
        addActiveSearchItem(items);
      } else if (e.key === "Enter") {
        e.preventDefault();
        if (currentSearchFocus > -1) {
          items[currentSearchFocus].click();
        } else if (items.length === 1) {
          items[0].click();
        }
      }
    });

    function addActiveSearchItem(items) {
      if (!items) return false;
      removeActiveSearchItem(items);
      if (currentSearchFocus >= items.length) currentSearchFocus = 0;
      if (currentSearchFocus < 0) currentSearchFocus = (items.length - 1);
      items[currentSearchFocus].classList.add("autocomplete-active");
      items[currentSearchFocus].scrollIntoView({ block: "nearest" });
    }

    function removeActiveSearchItem(items) {
      for (let i = 0; i < items.length; i++) {
        items[i].classList.remove("autocomplete-active");
      }
    }

    document.addEventListener('click', function(e) {
        const resultsContainer = document.getElementById("searchResults");
        if (resultsContainer && e.target.id !== 'adminSearchInput') {
            resultsContainer.style.display = "none";
        }
    });

    function selectTeacherFromDropdown() {
      const code = document.getElementById("adminTeacherSelect").value;
      if(!code) { document.getElementById("actionCard").style.display = "none"; return; }
      selectTeacherByCode(code);
    }

    function selectTeacherByCode(code) {
      const teacher = allTeachers.find(t => String(t.code) === String(code));
      if(!teacher) return;
      document.getElementById("selectedTeacherName").innerText = teacher.name;
      document.getElementById("selectedTeacherCode").value = teacher.code;
      document.getElementById("selectedTeacherStart").value = teacher.startTime; 
      document.getElementById("adminTeacherSelect").value = teacher.code;
      document.getElementById("adminSearchInput").value = "";
      
      document.getElementById("actionTypeSelect").value = "";
      document.getElementById("dynamicArea").style.display = "none";
      document.getElementById("actionCard").style.display = "block";
      
      setTimeout(() => {
        document.getElementById("actionTypeSelect").focus();
      }, 50);
    }

    function setToday(inputId) {
      document.getElementById(inputId).value = new Date().toISOString().split('T')[0];
      if(inputId === 'startDateInput' || inputId === 'endDateInput') {
        generateCheckboxes();
      }
    }

    function toggleDateMode() {
      const mode = document.querySelector('input[name="dateMode"]:checked').value;
      const today = new Date().toISOString().split('T')[0];
      
      if (mode === "single") {
        document.getElementById("singleDayArea").style.display = "block";
        document.getElementById("multipleDaysArea").style.display = "none";
        document.getElementById("singleDateInput").value = today;
      } else {
        document.getElementById("singleDayArea").style.display = "none";
        document.getElementById("multipleDaysArea").style.display = "block";
        document.getElementById("startDateInput").value = today;
        document.getElementById("endDateInput").value = today;
        generateCheckboxes();
      }
    }

    function handleActionTypeChange() {
      const type = document.getElementById("actionTypeSelect").value;
      const dynamicArea = document.getElementById("dynamicArea");
      const timeArea = document.getElementById("timeCalcArea");
      const dateArea = document.getElementById("dateSelectArea");
      const delayResultArea = document.getElementById("delayResultArea");
      
      if(!type) { dynamicArea.style.display = "none"; return; }
      dynamicArea.style.display = "block";
      document.getElementById("actionNotes").value = "";
      delayResultArea.style.display = "none";

      // تم إزالة إذن صباحي من قائمة الوقت ليتم معاملته كأيام الغياب
      const timeBased = ["تأخر صباحي", "تأخر بإذن", "خروج بدون إذن", "خروج بإذن"];
      if (timeBased.includes(type)) {
        dateArea.style.display = "none"; 
        timeArea.style.display = "block";
        setNowTime();
      } else {
        timeArea.style.display = "none"; 
        dateArea.style.display = "block";
        document.querySelector('input[name="dateMode"][value="single"]').checked = true;
        toggleDateMode();
      }
    }

    function setNowTime() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      document.getElementById("actionTimeInput").value = `${h}:${m}`;
      calculateDelay();
    }

    function calculateDelay() {
      const type = document.getElementById("actionTypeSelect").value;
      const resultArea = document.getElementById("delayResultArea");
      const delayInput = document.getElementById("manualDelayInput");
      
      if (type !== "تأخر صباحي" && type !== "تأخر بإذن") { 
        resultArea.style.display = "none"; 
        return; 
      }

      const actualTime = document.getElementById("actionTimeInput").value;
      let expectedTime = document.getElementById("selectedTeacherStart").value; 
      
      if (!actualTime || !expectedTime) {
        resultArea.style.display = "flex"; 
        delayInput.value = 0;
        return;
      }
      
      try {
        if(expectedTime.includes("T")) { expectedTime = expectedTime.substring(11, 16); }
        else if (expectedTime.length > 5) { expectedTime = expectedTime.substring(0, 5); }

        let [eh, em] = expectedTime.split(':').map(Number);
        let [ah, am] = actualTime.split(':').map(Number);
        
        let diff = (ah * 60 + am) - (eh * 60 + em);
        resultArea.style.display = "flex";
        if (diff > 0) {
          delayInput.value = diff;
        } else {
          delayInput.value = 0;
        }
      } catch(e) { 
        resultArea.style.display = "flex"; 
        delayInput.value = 0;
      }
    }

    function generateCheckboxes() {
      const startStr = document.getElementById("startDateInput").value;
      const endStr = document.getElementById("endDateInput").value;
      const container = document.getElementById("checkboxesContainer");
      const selectAllCont = document.getElementById("selectAllContainer");
      
      container.innerHTML = "";
      selectAllCont.style.display = "none";

      if(!startStr || !endStr) return;

      const startDate = new Date(startStr);
      const endDate = new Date(endStr);

      if(endDate < startDate) {
         document.getElementById("endDateInput").value = startStr;
         showMsg(document.getElementById("adminMessage"), "لا يمكن أن يسبق تاريخ النهاية تاريخ البداية.", true);
         generateCheckboxes(); 
         return;
      }

      const daysName = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
      
      const diffTime = Math.abs(endDate - startDate);
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

      if(diffDays > 60) {
          showMsg(document.getElementById("adminMessage"), "الفترة المحددة طويلة جداً. أقصى حد هو 60 يوماً.", true);
          return;
      }

      for(let i = 0; i <= diffDays; i++) {
        let currentDate = new Date(startDate);
        currentDate.setDate(startDate.getDate() + i);
        
        let dateStr = currentDate.toISOString().split('T')[0];
        let label = `${daysName[currentDate.getDay()]} (${currentDate.getDate()}/${currentDate.getMonth()+1})`;
        
        let div = document.createElement("label");
        div.className = "day-checkbox";
        div.innerHTML = `<input type="checkbox" class="day-check-item" value="${dateStr}" checked onchange="updateSelectAllStatus()" /> ${label}`;
        container.appendChild(div);
      }

      if(diffDays >= 0) {
          selectAllCont.style.display = "block";
          document.getElementById("selectAllDays").checked = true;
      }
    }

    function toggleAllDays(isChecked) {
      const boxes = document.querySelectorAll(".day-check-item");
      boxes.forEach(box => box.checked = isChecked);
    }

    function updateSelectAllStatus() {
      const total = document.querySelectorAll(".day-check-item").length;
      const checked = document.querySelectorAll(".day-check-item:checked").length;
      document.getElementById("selectAllDays").checked = (total === checked && total > 0);
    }

    function saveAttendance() {
      const auth = JSON.parse(localStorage.getItem("alkhateeb_hr_auth"));
      const btn = document.getElementById("saveActionBtn");
      const msgDiv = document.getElementById("adminMessage");
      
      const teacherCode = document.getElementById("selectedTeacherCode").value;
      const teacherName = document.getElementById("selectedTeacherName").innerText;
      const type = document.getElementById("actionTypeSelect").value;
      const notes = document.getElementById("actionNotes").value;
      
      let records = [];
      const timeBased = ["تأخر صباحي", "تأخر بإذن", "خروج بدون إذن", "خروج بإذن"];
      
      if (timeBased.includes(type)) {
        const time = document.getElementById("actionTimeInput").value;
        let mins = 0;
        if (type === "تأخر صباحي" || type === "تأخر بإذن") {
          mins = document.getElementById("manualDelayInput").value || 0;
        }
        records.push({ code: teacherCode, name: teacherName, type: type, dateStr: new Date().toISOString().split('T')[0], timeStr: time, minutes: mins, notes: notes });
      } else {
        const mode = document.querySelector('input[name="dateMode"]:checked').value;
        if (mode === "single") {
          const singleDate = document.getElementById("singleDateInput").value;
          if (!singleDate) { showMsg(msgDiv, "يرجى اختيار التاريخ", true); return; }
          records.push({ code: teacherCode, name: teacherName, type: type, dateStr: singleDate, timeStr: "", minutes: 1, notes: notes });
        } else {
          const boxes = document.querySelectorAll(".day-check-item:checked");
          if(boxes.length === 0) { showMsg(msgDiv, "اختر يوماً واحداً على الأقل", true); return; }
          boxes.forEach(box => {
            records.push({ code: teacherCode, name: teacherName, type: type, dateStr: box.value, timeStr: "", minutes: 1, notes: notes });
          });
        }
      }

      btn.disabled = true; btn.innerText = "جاري الحفظ...";
      
      fetch(APPS_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ action: "saveAttendanceRecord", token: auth.token, records: records })
      }).then(res => res.json()).then(data => {
        btn.disabled = false; btn.innerText = "تسجيل وحفظ";
        if(data.status === "success") {
          showMsg(msgDiv, data.message, false);
          document.getElementById("actionCard").style.display = "none";
          document.getElementById("adminSearchInput").value = "";
          document.getElementById("adminTeacherSelect").value = "";
        } else {
          showMsg(msgDiv, data.message, true);
        }
      }).catch(err => { btn.disabled = false; btn.innerText = "تسجيل وحفظ"; showMsg(msgDiv, "خطأ في الاتصال", true); });
    }

    function fetchTeacherStats(token) {
      const loader = document.getElementById("teacherLoader");
      loader.style.display = "block";
      fetch(APPS_SCRIPT_URL, {
        method: "POST", body: JSON.stringify({ action: "getTeacherStats", token: token })
      }).then(res => res.json()).then(data => {
        loader.style.display = "none";
        if(data.status === "success") {
          animateCircle("circleAttendance", "textAttendance", data.stats.attendanceRate, 100, "%");
          animateCircle("circleCasual", "textCasual", data.stats.remainingCasual, 21, "");
          animateCircle("circleLate", "textLate", data.stats.totalLateMins, 300, "ق");
          buildTimeline(data.history);
        }
      });
    }

    function animateCircle(circleId, textId, value, maxVal, suffix) {
      const circle = document.getElementById(circleId);
      const text = document.getElementById(textId);
      let percentage = (value / maxVal) * 100;
      if (percentage > 100) percentage = 100;
      if (percentage < 0) percentage = 0;
      
      setTimeout(() => {
        circle.setAttribute("stroke-dasharray", `${percentage}, 100`);
        text.innerHTML = value + suffix;
      }, 300);
    }

    function buildTimeline(history) {
      const container = document.getElementById("teacherTimeline");
      container.innerHTML = "";
      if(!history || history.length === 0) {
        container.innerHTML = "<p style='text-align:center; color:#888;'>لا يوجد سجل حركات حالياً.</p>";
        return;
      }
      history.forEach(item => {
        let dateStr = "";
        try { dateStr = item.date.split('T')[0]; } catch(e) { dateStr = item.date; }
        
        const div = document.createElement("div");
        div.className = "timeline-item";
        div.innerHTML = `
          <div class="timeline-date">${dateStr}</div>
          <div class="timeline-title">${item.type}</div>
          ${item.notes ? `<div class="timeline-notes">${item.notes}</div>` : ''}
        `;
        container.appendChild(div);
      });
    }
  </script>
</body>
