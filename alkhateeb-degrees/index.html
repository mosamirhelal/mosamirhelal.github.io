<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدخال الدرجات - مدرسة الشهيد محمود علي الخطيب</title>
    <meta
      property="og:title"
      content="إدخال الدرجات - مدرسة الشهيد محمود علي الخطيب"
    />
    <meta
      property="og:description"
      content="بوابة المعلمين لإدخال درجات الطلاب"
    />
    <meta
      property="og:image"
      content="https://mosamirhelal.com/alkhateeb/logo_3.webp"
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "Cairo", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        margin: 0;
        padding: 20px;
        background-color: #c9d0d9;
        animation: fadeInPage 0.55s ease-out;
        overflow-x: hidden;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      @keyframes fadeInPage {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes rowIn {
        from {
          opacity: 0;
          transform: translateX(-12px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes popIn {
        0% {
          opacity: 0;
          transform: scale(0.85);
        }
        70% {
          transform: scale(1.04);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes floatDot {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-18px);
        }
      }
      @keyframes pulseBlue {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(0, 86, 179, 0.7);
        }
        70% {
          transform: scale(1.02);
          box-shadow: 0 0 0 15px rgba(0, 86, 179, 0);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(0, 86, 179, 0);
        }
      }
      @keyframes pulseGreen {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7);
        }
        70% {
          transform: scale(1.02);
          box-shadow: 0 0 0 15px rgba(40, 167, 69, 0);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(40, 167, 69, 0);
        }
      }
      @keyframes ripple {
        from {
          transform: scale(0);
          opacity: 1;
        }
        to {
          transform: scale(3.5);
          opacity: 0;
        }
      }
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
      .pulse-button {
        animation: pulseBlue 1.5s infinite;
      }
      .pulse-success {
        animation: pulseGreen 1.5s infinite;
      }
      .dot {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        background: rgba(0, 86, 179, 0.05);
        animation: floatDot ease-in-out infinite;
      }
      .container {
        background: white;
        padding: 40px;
        border-radius: 15px;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        animation: slideInUp 0.8s ease-out;
        position: relative;
        z-index: 10;
      }
      .top-logos {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 15px;
        width: 100%;
        gap: 20px;
      }
      .top-logos img {
        max-height: 120px;
        max-width: 45%;
        width: auto;
        object-fit: contain;
      }
      .header-image {
        text-align: center;
        margin-bottom: 25px;
        padding: 0 10px;
      }
      .header-image img {
        width: 100%;
        max-width: 500px;
        height: auto;
      }
      h2 {
        color: #0056b3;
        margin-top: 10px;
        margin-bottom: 20px;
        font-size: 26px;
        font-weight: 800;
      }
      .form-control {
        font-size: 16px;
        padding: 12px 15px;
        border-radius: 11px;
        display: block;
        font-family: inherit;
        width: 100%;
        max-width: 350px;
        margin: 0 auto 15px auto;
        border: 2px solid #e1e1e1;
        text-align: center;
        transition: all 0.3s ease;
      }
      .form-control:focus {
        border-color: #0056b3;
        box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        outline: none;
      }
      select:disabled {
        background-color: #f5f5f5;
        cursor: not-allowed;
        color: #999;
      }
      button {
        background-color: #0056b3;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        max-width: 350px;
        margin: 0 auto;
        display: block;
        transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
        position: relative;
        overflow: hidden;
        font-family: inherit;
      }
      button:hover:not(:disabled) {
        background-color: #004494;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
      button:active:not(:disabled) {
        transform: translateY(1px);
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      button:disabled {
        background-color: #6c757d !important;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
        animation: none;
      }
      .btn-text {
        position: relative;
        z-index: 2;
      }
      .ripple-span {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        transform: scale(0);
        animation: ripple 0.6s ease-out forwards;
        pointer-events: none;
        z-index: 1;
      }
      .btn-success {
        background-color: #28a745;
        margin-top: 20px;
        border-radius: 11px;
      }
      .btn-success:hover:not(:disabled) {
        background-color: #218838;
      }
      .bulk-wrapper {
        display: none;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin: 20px auto;
        flex-wrap: wrap;
        background: #f8f9fa;
        padding: 15px;
        border-radius: 10px;
        border: 1px dashed #0056b3;
        width: 100%;
        animation: popIn 0.5s ease-out;
      }
      .btn-danger {
        background-color: #dc3545;
        max-width: 120px;
        margin: 0;
        padding: 12px 15px;
        border-radius: 11px;
      }
      .btn-danger:hover:not(:disabled) {
        background-color: #c82333;
      }
      .btn-absent-all {
        background-color: #fd7e14;
        max-width: 140px;
        margin: 0;
        padding: 12px 15px;
        border-radius: 11px;
      }
      .btn-absent-all:hover:not(:disabled) {
        background-color: #e8590c;
      }
      .btn-reset-all {
        background-color: #6c757d;
        max-width: 140px;
        margin: 0;
        padding: 12px 15px;
        border-radius: 11px;
      }
      .btn-reset-all:hover:not(:disabled) {
        background-color: #5a6268;
      }
      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin-top: 10px;
        background-color: white;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid #eee;
        display: none;
      }
      th,
      td {
        border-bottom: 1px solid #eee;
        border-left: 1px solid #eee;
        padding: 15px;
        text-align: center;
      }
      th:last-child,
      td:last-child {
        border-left: none;
      }
      tr:last-child td {
        border-bottom: none;
      }
      th {
        background-color: #0056b3;
        color: white;
        font-weight: 700;
      }
      tbody tr {
        transition: background 0.15s;
      }
      tbody tr:nth-child(even) {
        background-color: #fbfbfb;
      }
      tbody tr:hover {
        background: #eef4ff;
      }
      .row-anim {
        animation: rowIn 0.35s ease forwards;
        opacity: 0;
      }
      .score-input {
        width: 100%;
        max-width: 100px;
        padding: 10px;
        border-radius: 8px;
        border: 2px solid #e1e1e1;
        text-align: center;
        font-family: inherit;
        font-weight: bold;
        direction: ltr;
        margin: 0;
        transition: 0.3s;
      }
      .score-input:focus {
        border-color: #0056b3;
        box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        outline: none;
        background-color: #eef4ff;
      }
      .score-input:disabled {
        background-color: #f5f5f5;
        cursor: not-allowed;
        border-color: #ddd;
      }
      .error-border {
        border-color: #b23a48 !important;
        box-shadow: 0 0 0 3px rgba(178, 58, 72, 0.2) !important;
        background-color: #fff0f0 !important;
      }
      .checkbox-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
      }
      .absent-label {
        font-weight: bold;
        color: #b23a48;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 15px;
        user-select: none;
      }
      .absent-checkbox {
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: #b23a48;
        margin: 0;
      }
      .loader {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #0056b3;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
        display: none;
      }
      .status-message {
        padding: 12px;
        border-radius: 8px;
        margin-top: 20px;
        font-size: 16px;
        font-weight: bold;
        width: 100%;
        animation: popIn 0.5s 0.1s ease-out both;
        display: none;
      }
      .success-msg {
        background-color: #008000;
        color: #f2e8cf;
        border: 1px solid #c3e6cb;
      }
      .error-msg {
        background-color: #b23a48;
        color: #fed0bb;
        border: 1px solid #f5c6cb;
      }
      .designer-credit {
        margin-top: 15px;
        font-size: 13px;
        color: #4a4e69;
        text-align: center;
        font-weight: bold;
      }
      .pagination-controls {
        display: none;
        justify-content: space-between;
        align-items: center;
        margin-top: 20px;
        background: #f8f9fa;
        padding: 10px 20px;
        border-radius: 10px;
        border: 1px solid #eee;
      }
      .page-btn {
        background-color: #4a4e69;
        color: white;
        padding: 8px 15px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        max-width: 100px;
        margin: 0;
      }
      .page-btn:hover:not(:disabled) {
        background-color: #333652;
      }
      .page-btn:disabled {
        background-color: #ccc !important;
        transform: none;
        box-shadow: none;
        animation: none;
      }
      .page-info {
        font-weight: bold;
        color: #0056b3;
      }
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        animation: fadeInPage 0.3s;
      }
      .modal-content {
        background: white;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        animation: popIn 0.3s ease-out;
        max-width: 90%;
        width: 400px;
      }
      .modal-title {
        color: #0056b3;
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 25px;
        line-height: 1.5;
      }
      .modal-buttons {
        display: flex;
        justify-content: center;
        gap: 15px;
      }
      .btn-modal-confirm {
        background-color: #28a745;
        margin: 0;
        padding: 10px 20px;
        max-width: 120px;
        border-radius: 11px;
      }
      .btn-modal-confirm:hover:not(:disabled) {
        background-color: #218838;
      }
      .btn-modal-cancel {
        background-color: #dc3545;
        margin: 0;
        padding: 10px 20px;
        max-width: 120px;
        border-radius: 11px;
      }
      .btn-modal-cancel:hover:not(:disabled) {
        background-color: #c82333;
      }
      @media (min-width: 768px) {
        .top-logos img {
          max-height: 160px;
        }
        .header-image img {
          max-width: 580px;
        }
      }
      @media (max-width: 480px) {
        body {
          padding: 15px 10px;
        }
        .container {
          padding: 25px 20px;
          border-radius: 10px;
        }
        .top-logos img {
          max-height: 90px;
        }
        h2 {
          font-size: 22px;
        }
        th,
        td {
          padding: 10px;
          font-size: 14px;
        }
        .form-control,
        button {
          max-width: 100%;
        }
        .pagination-controls {
          flex-direction: column;
          gap: 10px;
        }
        .modal-content {
          padding: 20px;
        }
        .modal-buttons {
          flex-direction: column;
          gap: 10px;
        }
        .btn-modal-confirm,
        .btn-modal-cancel {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div
      class="dot"
      style="
        width: 90px;
        height: 90px;
        top: 8%;
        left: 4%;
        animation-duration: 6s;
      "
    ></div>
    <div
      class="dot"
      style="
        width: 60px;
        height: 60px;
        top: 20%;
        right: 6%;
        animation-duration: 8s;
        animation-delay: 1s;
      "
    ></div>
    <div
      class="dot"
      style="
        width: 120px;
        height: 120px;
        top: 55%;
        left: 2%;
        animation-duration: 10s;
        animation-delay: 2s;
      "
    ></div>
    <div
      class="dot"
      style="
        width: 50px;
        height: 50px;
        top: 70%;
        right: 4%;
        animation-duration: 7s;
        animation-delay: 0.5s;
      "
    ></div>
    <div
      class="dot"
      style="
        width: 80px;
        height: 80px;
        top: 38%;
        right: 11%;
        animation-duration: 9s;
        animation-delay: 3s;
      "
    ></div>

    <div class="container">
      <div class="top-logos">
        <img
          src="https://mosamirhelal.com/alkhateeb/logo_2.webp"
          alt="وزارة التربية والتعليم"
        />
        <img
          src="https://mosamirhelal.com/alkhateeb/logo_1.webp"
          alt="شعار المدرسة"
        />
      </div>
      <div class="header-image">
        <img
          src="https://mosamirhelal.com/alkhateeb/logo_3.webp"
          alt="مدرسة الشهيد محمود علي الخطيب"
        />
      </div>
      <h2>بوابة إدخال الدرجات</h2>

      <select id="sheetSelect" class="form-control" onchange="showGrades()">
        <option value="">-- اختر نوع التقييم --</option>
        <option value="تقييمات شهر مارس">تقييمات شهر مارس</option>
        <option value="امتحانات شهر مارس">امتحانات شهر مارس</option>
        <option value="تقييمات شهر أبريل">تقييمات شهر أبريل</option>
        <option value="امتحانات شهر أبريل">امتحانات شهر أبريل</option>
      </select>

      <select
        id="gradeSelect"
        class="form-control"
        style="display: none"
        onchange="showSections()"
      >
        <option value="">-- اختر الصف الدراسي --</option>
        <option value="ثالث ابتدائي">الصف الثالث الابتدائي</option>
        <option value="رابع ابتدائي">الصف الرابع الابتدائي</option>
        <option value="خامس ابتدائي">الصف الخامس الابتدائي</option>
        <option value="سادس ابتدائي">الصف السادس الابتدائي</option>
        <option value="أول اعدادي">الصف الأول الإعدادي</option>
        <option value="ثاني اعدادي">الصف الثاني الإعدادي</option>
      </select>

      <select
        id="sectionSelect"
        class="form-control"
        style="display: none"
        onchange="showSubjects()"
      >
        <option value="">-- اختر رقم الفصل --</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>

      <select
        id="subjectSelect"
        class="form-control"
        style="display: none"
        onchange="showSearchBtn()"
      >
        <option value="">-- اختر المادة --</option>
        <option value="عربي">اللغة العربية</option>
        <option value="انجليزي">اللغة الإنجليزية</option>
        <option value="رياضيات">الرياضيات</option>
        <option value="علوم">العلوم</option>
      </select>

      <button
        id="searchBtn"
        class="form-control pulse-button"
        style="display: none"
        onclick="addRipple(event, this); fetchStudents()"
      >
        <span class="btn-text">🔎 عرض كشف الطلاب</span>
      </button>

      <div id="inlineMessage" class="status-message"></div>
      <div class="loader" id="loader"></div>

      <div id="bulkScoreDiv" class="bulk-wrapper">
        <span style="font-weight: bold; color: #0056b3; font-size: 15px"
          >تعميم درجة:</span
        >
        <input
          type="text"
          id="bulkScoreInput"
          inputmode="numeric"
          class="score-input"
          placeholder="الدرجة"
          style="max-width: 80px; margin: 0"
        />

        <button
          class="btn-danger"
          onclick="addRipple(event, this); showBulkConfirm()"
        >
          <span class="btn-text">⚡ تطبيق</span>
        </button>

        <button
          class="btn-absent-all"
          onclick="addRipple(event, this); showAbsentConfirm()"
        >
          <span class="btn-text">🚫 غياب للكل</span>
        </button>

        <button
          class="btn-reset-all"
          onclick="addRipple(event, this); showPresentConfirm()"
        >
          <span class="btn-text">🔄 حضور للكل</span>
        </button>
      </div>

      <div
        id="tableControls"
        style="
          display: none;
          justify-content: space-between;
          align-items: center;
          width: 100%;
          margin-top: 20px;
          padding: 0 5px;
          background: #f8f9fa;
          border-radius: 10px;
          padding: 10px 15px;
          border: 1px solid #eee;
        "
      >
        <span style="font-weight: bold; color: #0056b3; font-size: 15px"
          >عرض الطلاب بالصفحة:</span
        >
        <select
          id="rowsPerPageSelect"
          class="form-control"
          style="max-width: 100px; margin: 0; padding: 8px; text-align: center"
          onchange="updateRowsPerPage()"
        >
          <option value="10">10</option>
          <option value="20">20</option>
          <option value="30">30</option>
          <option value="50">50</option>
          <option value="10000">الكل</option>
        </select>
      </div>

      <table id="studentsTable">
        <thead>
          <tr>
            <th>اسم الطالب</th>
            <th>الدرجة</th>
          </tr>
        </thead>
        <tbody id="studentsBody"></tbody>
      </table>

      <div id="paginationDiv" class="pagination-controls">
        <button
          id="prevBtn"
          class="page-btn"
          onclick="addRipple(event, this); changePage(-1)"
        >
          <span class="btn-text">السابق</span>
        </button>
        <span class="page-info"
          >صفحة <span id="currentPageNum">1</span> من
          <span id="totalPagesNum">1</span></span
        >
        <button
          id="nextBtn"
          class="page-btn"
          onclick="addRipple(event, this); changePage(1)"
        >
          <span class="btn-text">التالي</span>
        </button>
      </div>

      <button
        id="saveBtn"
        class="form-control btn-success pulse-success"
        style="display: none"
        onclick="addRipple(event, this); saveData()"
      >
        <span class="btn-text">💾 حفظ الدرجات</span>
      </button>

      <div id="saveMessage" class="status-message"></div>
      <div class="designer-credit">تصميم وتنفيذ : سمير هلال</div>
    </div>

    <div id="customModal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-title" id="modalTitleText"></div>
        <div class="modal-buttons">
          <button
            class="btn-modal-confirm"
            onclick="addRipple(event, this); executeModalAction()"
          >
            نعم
          </button>
          <button
            class="btn-modal-cancel"
            onclick="addRipple(event, this); closeBulkModal()"
          >
            لا
          </button>
        </div>
      </div>
    </div>

    <script>
      const APPS_SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbx8JBu5aQKAf3cKN9kEss8RiFHoW9DiqbgSlLO3JiIRxtXEzsJh3MU1sgIU2cVPP-rNkw/exec";
      let allStudents = [];
      let currentPage = 1;
      let rowsPerPage = 10;
      let currentModalAction = "";
      let highlightErrors = false;

      window.onload = function () {
        restoreStateLocally();
      };

      function updateRowsPerPage() {
        rowsPerPage = parseInt(
          document.getElementById("rowsPerPageSelect").value
        );
        currentPage = 1;
        saveStateLocally();
        renderTable();
      }

      function saveStateLocally() {
        if (allStudents.length === 0) return;
        const state = {
          sheet: document.getElementById("sheetSelect").value,
          grade: document.getElementById("gradeSelect").value,
          section: document.getElementById("sectionSelect").value,
          subject: document.getElementById("subjectSelect").value,
          students: allStudents,
          currentPage: currentPage,
          rowsPerPage: rowsPerPage,
          timestamp: Date.now(),
        };
        localStorage.setItem("alkhateeb_grades_draft", JSON.stringify(state));
      }

      function restoreStateLocally() {
        const draft = localStorage.getItem("alkhateeb_grades_draft");
        if (draft) {
          try {
            const state = JSON.parse(draft);
            const now = Date.now();
            const expirationTime = 5 * 60 * 1000;
            if (!state.timestamp || now - state.timestamp > expirationTime) {
              localStorage.removeItem("alkhateeb_grades_draft");
              return;
            }
            if (state.students && state.students.length > 0) {
              allStudents = state.students;
              currentPage = state.currentPage || 1;
              if (state.rowsPerPage) {
                rowsPerPage = state.rowsPerPage;
                document.getElementById("rowsPerPageSelect").value =
                  rowsPerPage;
              }
              document.getElementById("sheetSelect").value = state.sheet;
              const gradeSelect = document.getElementById("gradeSelect");
              gradeSelect.style.display = "block";
              gradeSelect.value = state.grade;
              const sectionSelect = document.getElementById("sectionSelect");
              sectionSelect.style.display = "block";
              sectionSelect.value = state.section;
              const subjectSelect = document.getElementById("subjectSelect");
              subjectSelect.style.display = "block";
              subjectSelect.value = state.subject;
              document.getElementById("searchBtn").style.display = "block";
              document.getElementById("bulkScoreDiv").style.display = "flex";
              document.getElementById("tableControls").style.display = "flex";
              const saveBtn = document.getElementById("saveBtn");
              saveBtn.disabled = false;
              saveBtn.style.display = "block";
              saveBtn.onclick = function (event) {
                addRipple(event, this);
                saveData();
              };
              saveBtn.className = "form-control btn-success pulse-success";
              renderTable();
              document.getElementById("studentsTable").style.display = "table";
              showMessage(
                "تم استعادة بياناتك السابقة التي لم يتم حفظها.",
                false
              );
            }
          } catch (e) {}
        }
      }

      function addRipple(e, btn) {
        if (btn.disabled) return;
        const rect = btn.getBoundingClientRect();
        let x, y;
        if (e.clientX !== undefined && e.clientX !== 0) {
          x = e.clientX - rect.left;
          y = e.clientY - rect.top;
        } else if (e.touches && e.touches.length > 0) {
          x = e.touches[0].clientX - rect.left;
          y = e.touches[0].clientY - rect.top;
        } else {
          x = rect.width / 2;
          y = rect.height / 2;
        }
        const size = Math.max(rect.width, rect.height);
        const span = document.createElement("span");
        span.className = "ripple-span";
        span.style.width = span.style.height = size + "px";
        span.style.left = x - size / 2 + "px";
        span.style.top = y - size / 2 + "px";
        btn.appendChild(span);
        setTimeout(() => span.remove(), 600);
      }

      function convertToEnglishNumbers(str) {
        const arabicNumbers = [
          "٠",
          "١",
          "٢",
          "٣",
          "٤",
          "٥",
          "٦",
          "٧",
          "٨",
          "٩",
        ];
        let englishStr = String(str).replace(/[٠-٩]/g, function (w) {
          return arabicNumbers.indexOf(w);
        });
        return englishStr.replace(/[^0-9.]/g, "");
      }

      function handleScoreInput(globalIndex, inputEl) {
        inputEl.classList.remove("error-border");
        let englishStr = convertToEnglishNumbers(inputEl.value);
        let cleanedStr = englishStr.replace(/[^0-9.]/g, "");
        if (cleanedStr !== "") {
          let num = parseFloat(cleanedStr);
          if (num > 100) {
            cleanedStr = "";
          }
        }
        inputEl.value = cleanedStr;
        updateStudentScore(globalIndex, cleanedStr);
      }

      function toggleAbsence(globalIndex, isChecked) {
        const inputEl = document.getElementById("score_" + globalIndex);
        inputEl.classList.remove("error-border");
        if (isChecked) {
          inputEl.value = "";
          inputEl.disabled = true;
          updateStudentScore(globalIndex, "غ");
        } else {
          inputEl.disabled = false;
          updateStudentScore(globalIndex, "");
          inputEl.focus();
        }
      }

      function hideTableAndMessages() {
        document.getElementById("inlineMessage").style.display = "none";
        document.getElementById("saveMessage").style.display = "none";
        document.getElementById("studentsTable").style.display = "none";
        document.getElementById("tableControls").style.display = "none";
        document.getElementById("paginationDiv").style.display = "none";
        document.getElementById("saveBtn").style.display = "none";
        document.getElementById("bulkScoreDiv").style.display = "none";
      }

      function showGrades() {
        hideTableAndMessages();
        const sheet = document.getElementById("sheetSelect").value;
        const gradeSelect = document.getElementById("gradeSelect");
        const sectionSelect = document.getElementById("sectionSelect");
        const subjectSelect = document.getElementById("subjectSelect");
        const searchBtn = document.getElementById("searchBtn");
        gradeSelect.value = "";
        sectionSelect.value = "";
        subjectSelect.value = "";
        sectionSelect.style.display = "none";
        subjectSelect.style.display = "none";
        searchBtn.style.display = "none";
        if (sheet !== "") {
          gradeSelect.style.display = "block";
          gradeSelect.style.animation = "slideInUp 0.3s ease-out";
        } else {
          gradeSelect.style.display = "none";
        }
      }

      function showSections() {
        hideTableAndMessages();
        const grade = document.getElementById("gradeSelect").value;
        const sectionSelect = document.getElementById("sectionSelect");
        const subjectSelect = document.getElementById("subjectSelect");
        const searchBtn = document.getElementById("searchBtn");
        sectionSelect.value = "";
        subjectSelect.value = "";
        subjectSelect.style.display = "none";
        searchBtn.style.display = "none";
        if (grade !== "") {
          sectionSelect.style.display = "block";
          sectionSelect.style.animation = "slideInUp 0.3s ease-out";
        } else {
          sectionSelect.style.display = "none";
        }
      }

      function showSubjects() {
        hideTableAndMessages();
        const section = document.getElementById("sectionSelect").value;
        const subjectSelect = document.getElementById("subjectSelect");
        const searchBtn = document.getElementById("searchBtn");
        subjectSelect.value = "";
        searchBtn.style.display = "none";
        if (section !== "") {
          subjectSelect.style.display = "block";
          subjectSelect.style.animation = "slideInUp 0.3s ease-out";
        } else {
          subjectSelect.style.display = "none";
        }
      }

      function showSearchBtn() {
        hideTableAndMessages();
        const subject = document.getElementById("subjectSelect").value;
        const searchBtn = document.getElementById("searchBtn");
        if (subject !== "") {
          searchBtn.style.display = "block";
          searchBtn.style.animation = "slideInUp 0.3s ease-out";
          setTimeout(function () {
            searchBtn.style.animation = "";
          }, 300);
        } else {
          searchBtn.style.display = "none";
        }
      }

      function showMessage(text, isError = false) {
        const msgDiv = document.getElementById("inlineMessage");
        msgDiv.innerText = text;
        msgDiv.className = isError
          ? "status-message error-msg"
          : "status-message success-msg";
        msgDiv.style.display = "block";
      }

      function showSaveMessage(text, isError = false) {
        const msgDiv = document.getElementById("saveMessage");
        msgDiv.innerText = text;
        msgDiv.className = isError
          ? "status-message error-msg"
          : "status-message success-msg";
        msgDiv.style.display = "block";
      }

      function showBulkConfirm() {
        const inputEl = document.getElementById("bulkScoreInput");
        let englishStr = convertToEnglishNumbers(inputEl.value);
        let cleanedStr = englishStr.replace(/[^0-9.]/g, "");
        if (cleanedStr !== "") {
          let num = parseFloat(cleanedStr);
          if (num > 100) {
            inputEl.value = "";
            showMessage("الدرجة لا يمكن أن تتجاوز 100", true);
            return;
          }
          currentModalAction = "bulkScore";
          document.getElementById("modalTitleText").innerText =
            "هل تريد بالتأكيد تعميم هذه الدرجة على جميع الطلاب الحاضرين؟";
          document.getElementById("customModal").style.display = "flex";
        } else {
          showMessage("⚠️ يرجى إدخال درجة صالحة أولاً.", true);
        }
      }

      function showAbsentConfirm() {
        currentModalAction = "bulkAbsent";
        document.getElementById("modalTitleText").innerText =
          "هل تريد بالتأكيد تسجيل غياب لجميع الطلاب؟";
        document.getElementById("customModal").style.display = "flex";
      }

      function showPresentConfirm() {
        currentModalAction = "allPresent";
        document.getElementById("modalTitleText").innerText =
          "هل تريد بالتأكيد إلغاء الغياب لجميع الطلاب ليصبحوا حاضرين؟";
        document.getElementById("customModal").style.display = "flex";
      }

      function executeModalAction() {
        if (currentModalAction === "bulkScore") {
          confirmBulkScore();
        } else if (currentModalAction === "bulkAbsent") {
          confirmBulkAbsent();
        } else if (currentModalAction === "allPresent") {
          confirmAllPresent();
        }
      }

      function confirmBulkAbsent() {
        for (let i = 0; i < allStudents.length; i++) {
          allStudents[i].score = "غ";
        }
        closeBulkModal();
        renderTable();
        saveStateLocally();
        showMessage("✅ تم تسجيل غياب جميع الطلاب بنجاح.", false);
      }

      function confirmAllPresent() {
        for (let i = 0; i < allStudents.length; i++) {
          if (allStudents[i].score === "غ") {
            allStudents[i].score = "";
          }
        }
        closeBulkModal();
        renderTable();
        saveStateLocally();
        showMessage(
          "✅ تم إلغاء الغياب وتحويل الطلاب إلى حاضرين بنجاح.",
          false
        );
      }

      function closeBulkModal() {
        document.getElementById("customModal").style.display = "none";
        currentModalAction = "";
      }

      function confirmBulkScore() {
        const inputEl = document.getElementById("bulkScoreInput");
        let englishStr = convertToEnglishNumbers(inputEl.value);
        let cleanedStr = englishStr.replace(/[^0-9.]/g, "");
        for (let i = 0; i < allStudents.length; i++) {
          if (allStudents[i].score !== "غ") {
            allStudents[i].score = cleanedStr;
          }
        }
        inputEl.value = "";
        closeBulkModal();
        renderTable();
        saveStateLocally();
        showMessage(
          "✅ تم تعميم الدرجة بنجاح على جميع الطلاب الحاضرين.",
          false
        );
      }

      function fetchStudents() {
        const sheetSelect = document.getElementById("sheetSelect");
        const gradeSelect = document.getElementById("gradeSelect");
        const sectionSelect = document.getElementById("sectionSelect");
        const subjectSelect = document.getElementById("subjectSelect");
        const searchBtn = document.getElementById("searchBtn");
        const loader = document.getElementById("loader");
        const searchBtnText = searchBtn.querySelector(".btn-text");
        const sheetName = sheetSelect.value;
        const grade = gradeSelect.value;
        const section = sectionSelect.value;
        const subject = subjectSelect.value;
        hideTableAndMessages();
        loader.style.display = "block";
        searchBtn.disabled = true;
        searchBtn.classList.remove("pulse-button");
        searchBtnText.innerText = "⏳ جاري البحث...";
        sheetSelect.disabled = true;
        gradeSelect.disabled = true;
        sectionSelect.disabled = true;
        subjectSelect.disabled = true;

        const url = `${APPS_SCRIPT_URL}?action=getStudents&sheetName=${encodeURIComponent(
          sheetName
        )}&grade=${encodeURIComponent(grade)}&section=${encodeURIComponent(
          section
        )}&subject=${encodeURIComponent(subject)}`;

        fetch(url)
          .then((response) => response.json())
          .then((data) => {
            loader.style.display = "none";
            searchBtn.disabled = false;
            searchBtn.classList.add("pulse-button");
            searchBtnText.innerText = "🔎 عرض كشف الطلاب";
            sheetSelect.disabled = false;
            gradeSelect.disabled = false;
            sectionSelect.disabled = false;
            subjectSelect.disabled = false;
            if (data.status === "error") {
              showMessage(data.message, true);
              return;
            }
            if (data.students.length === 0) {
              showMessage("لا يوجد طلاب مسجلين طبقًا للخيارات السابقة.", true);
              return;
            }
            allStudents = data.students;
            currentPage = 1;
            highlightErrors = false;
            const saveBtn = document.getElementById("saveBtn");
            const saveBtnText = saveBtn.querySelector(".btn-text");
            saveBtn.disabled = false;
            saveBtn.onclick = function (event) {
              addRipple(event, this);
              saveData();
            };
            saveBtn.className = "form-control btn-success pulse-success";
            saveBtnText.innerText = "💾 حفظ الدرجات";

            document.getElementById("bulkScoreInput").value = "";
            document.getElementById("bulkScoreDiv").style.display = "flex";
            document.getElementById("tableControls").style.display = "flex";

            renderTable();
            saveStateLocally();
            document.getElementById("studentsTable").style.display = "table";
            saveBtn.style.display = "block";
            setTimeout(() => {
              const firstInput = document.querySelector(".student-score");
              if (firstInput && !firstInput.disabled) {
                firstInput.focus();
                firstInput.select();
              }
            }, 100);
          })
          .catch((error) => {
            loader.style.display = "none";
            searchBtn.disabled = false;
            searchBtn.classList.add("pulse-button");
            searchBtnText.innerText = "🔎 عرض كشف الطلاب";
            sheetSelect.disabled = false;
            gradeSelect.disabled = false;
            sectionSelect.disabled = false;
            subjectSelect.disabled = false;
            showMessage("حدث خطأ في الاتصال بقاعدة البيانات.", true);
          });
      }

      function renderTable() {
        const tbody = document.getElementById("studentsBody");
        tbody.innerHTML = "";
        const totalPages = Math.ceil(allStudents.length / rowsPerPage);
        document.getElementById("currentPageNum").innerText = currentPage;
        document.getElementById("totalPagesNum").innerText = totalPages;
        const pagination = document.getElementById("paginationDiv");
        if (totalPages > 1) {
          pagination.style.display = "flex";
          document.getElementById("prevBtn").disabled = currentPage === 1;
          document.getElementById("nextBtn").disabled =
            currentPage === totalPages;
        } else {
          pagination.style.display = "none";
        }
        const start = (currentPage - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const pageStudents = allStudents.slice(start, end);
        pageStudents.forEach((student, index) => {
          const globalIndex = start + index;
          const isAbsent = student.score === "غ";
          const displayScore = isAbsent ? "" : student.score;
          const isEmpty =
            student.score === "" ||
            student.score === null ||
            student.score === undefined;
          const isErrorClass =
            highlightErrors && !isAbsent && isEmpty ? "error-border" : "";

          const row = document.createElement("tr");
          row.className = "row-anim";
          row.style.animationDelay = `${Math.min(index * 0.02, 0.4)}s`;
          row.innerHTML = `
            <td style='font-weight:600; color:#0056b3; vertical-align: middle;'>${
              student.name
            }</td>
            <td>
              <div class="checkbox-wrapper">
                <input type='text' inputmode='numeric' class='score-input student-score ${isErrorClass}' placeholder='الدرجة' value='${displayScore}' 
                       id='score_${globalIndex}'
                       ${isAbsent ? "disabled" : ""}
                       onfocus='this.select()' 
                       oninput='handleScoreInput(${globalIndex}, this)' 
                       onkeydown='handleEnter(event, this)'>
                <label class="absent-label">
                  <input type='checkbox' class='absent-checkbox' ${
                    isAbsent ? "checked" : ""
                  } 
                         onchange='toggleAbsence(${globalIndex}, this.checked)'>
                  غائب
                </label>
              </div>
            </td>
          `;
          tbody.appendChild(row);
        });
      }

      function changePage(direction) {
        currentPage += direction;
        saveStateLocally();
        renderTable();
      }

      function updateStudentScore(globalIndex, value) {
        allStudents[globalIndex].score = value;
        saveStateLocally();
      }

      function handleEnter(event, currentInput) {
        if (event.key === "Enter") {
          event.preventDefault();
          const inputs = Array.from(
            document.getElementsByClassName("student-score")
          );
          const currentIndex = inputs.indexOf(currentInput);
          const totalPages = Math.ceil(allStudents.length / rowsPerPage);
          let nextIndex = currentIndex + 1;
          while (nextIndex < inputs.length && inputs[nextIndex].disabled) {
            nextIndex++;
          }
          if (nextIndex < inputs.length) {
            inputs[nextIndex].focus();
            inputs[nextIndex].select();
          } else {
            if (currentPage < totalPages) {
              changePage(1);
              setTimeout(() => {
                const newInputs = Array.from(
                  document.getElementsByClassName("student-score")
                );
                let firstEnabledIndex = 0;
                while (
                  firstEnabledIndex < newInputs.length &&
                  newInputs[firstEnabledIndex].disabled
                ) {
                  firstEnabledIndex++;
                }
                if (firstEnabledIndex < newInputs.length) {
                  newInputs[firstEnabledIndex].focus();
                  newInputs[firstEnabledIndex].select();
                }
              }, 50);
            } else {
              saveData();
            }
          }
        }
      }

      function saveData() {
        const saveBtn = document.getElementById("saveBtn");
        const saveBtnText = saveBtn.querySelector(".btn-text");
        if (saveBtn.disabled) return;

        let firstEmptyIndex = -1;
        for (let i = 0; i < allStudents.length; i++) {
          if (
            allStudents[i].score === "" ||
            allStudents[i].score === null ||
            allStudents[i].score === undefined
          ) {
            if (firstEmptyIndex === -1) firstEmptyIndex = i;
          }
        }

        if (firstEmptyIndex !== -1) {
          highlightErrors = true;
          const targetPage = Math.floor(firstEmptyIndex / rowsPerPage) + 1;
          if (currentPage !== targetPage) {
            currentPage = targetPage;
          }
          renderTable();
          showSaveMessage("⚠️ يرجى إدخال جميع الدرجات، توجد حقول فارغة!", true);

          setTimeout(() => {
            const emptyInput = document.getElementById(
              "score_" + firstEmptyIndex
            );
            if (emptyInput && !emptyInput.disabled) {
              emptyInput.scrollIntoView({
                behavior: "smooth",
                block: "center",
              });
              emptyInput.focus({ preventScroll: true });
            }
          }, 100);
          return;
        }

        highlightErrors = false;
        const sheetName = document.getElementById("sheetSelect").value;
        const grade = document.getElementById("gradeSelect").value;
        const section = document.getElementById("sectionSelect").value;
        const subject = document.getElementById("subjectSelect").value;
        document.getElementById("inlineMessage").style.display = "none";
        document.getElementById("saveMessage").style.display = "none";
        saveBtn.disabled = true;
        saveBtn.classList.remove("pulse-success");
        saveBtnText.innerText = "⏳ جاري الحفظ...";

        const payload = {
          sheetName: sheetName,
          grade: grade,
          section: section,
          subject: subject,
          gradesData: allStudents,
        };

        fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload),
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.status === "success") {
              localStorage.removeItem("alkhateeb_grades_draft");
              document.getElementById("studentsTable").style.display = "none";
              document.getElementById("tableControls").style.display = "none";
              document.getElementById("paginationDiv").style.display = "none";
              document.getElementById("saveBtn").style.display = "none";
              document.getElementById("bulkScoreDiv").style.display = "none";
              document.getElementById("sheetSelect").value = "";
              document.getElementById("gradeSelect").value = "";
              document.getElementById("sectionSelect").value = "";
              document.getElementById("subjectSelect").value = "";
              document.getElementById("gradeSelect").style.display = "none";
              document.getElementById("sectionSelect").style.display = "none";
              document.getElementById("subjectSelect").style.display = "none";
              document.getElementById("searchBtn").style.display = "none";
              showSaveMessage("✅ تم حفظ درجات الفصل بنجاح!");
            } else {
              saveBtn.disabled = false;
              saveBtn.classList.add("pulse-success");
              saveBtnText.innerText = "💾 حفظ الدرجات";
              showSaveMessage("❌ حدث خطأ: " + data.message, true);
            }
          })
          .catch((error) => {
            saveBtn.disabled = false;
            saveBtn.classList.add("pulse-success");
            saveBtnText.innerText = "💾 حفظ الدرجات";
            showSaveMessage(
              "حدث مشكلة في الإرسال، تأكد من الاتصال بالإنترنت.",
              true
            );
          });
      }
    </script>
  </body>
</html>
