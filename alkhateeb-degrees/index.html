<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إدخال الدرجات - مدرسة الشهيد محمود علي الخطيب</title>
    <meta
      property="og:title"
      content="إدخال الدرجات - مدرسة الشهيد محمود علي الخطيب"
    />
    <meta
      property="og:description"
      content="بوابة المعلمين لإدخال درجات الطلاب"
    />
    <meta
      property="og:image"
      content="https://mosamirhelal.com/alkhateeb/logo_3.webp"
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "Cairo", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        margin: 0;
        padding: 20px;
        background-color: #c9d0d9;
        animation: fadeInPage 0.55s ease-out;
        overflow-x: hidden;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      @keyframes fadeInPage {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes rowIn {
        from {
          opacity: 0;
          transform: translateX(12px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes popIn {
        0% {
          opacity: 0;
          transform: scale(0.85);
        }
        70% {
          transform: scale(1.04);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes floatDot {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-18px);
        }
      }
      @keyframes pulseBlue {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(0, 86, 179, 0.7);
        }
        70% {
          transform: scale(1.02);
          box-shadow: 0 0 0 15px rgba(0, 86, 179, 0);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(0, 86, 179, 0);
        }
      }
      @keyframes pulseGreen {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7);
        }
        70% {
          transform: scale(1.02);
          box-shadow: 0 0 0 15px rgba(40, 167, 69, 0);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(40, 167, 69, 0);
        }
      }
      @keyframes ripple {
        from {
          transform: scale(0);
          opacity: 1;
        }
        to {
          transform: scale(3.5);
          opacity: 0;
        }
      }
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
      .pulse-button {
        animation: pulseBlue 1.5s infinite;
      }
      .pulse-success {
        animation: pulseGreen 1.5s infinite;
      }
      .dot {
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        background: rgba(0, 86, 179, 0.05);
        animation: floatDot ease-in-out infinite;
      }
      .container {
        background: white;
        padding: 40px;
        border-radius: 15px;
        width: 100%;
        max-width: 800px;
        margin: 0 auto;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        animation: slideInUp 0.8s ease-out;
        position: relative;
        z-index: 10;
      }
      .top-logos {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 15px;
        width: 100%;
        gap: 20px;
      }
      .top-logos img {
        max-height: 120px;
        max-width: 45%;
        width: auto;
        object-fit: contain;
      }
      .header-image {
        text-align: center;
        margin-bottom: 25px;
        padding: 0 10px;
      }
      .header-image img {
        width: 100%;
        max-width: 500px;
        height: auto;
      }
      h2 {
        color: #0056b3;
        margin-top: 10px;
        margin-bottom: 20px;
        font-size: 26px;
        font-weight: 800;
      }
      .form-control {
        font-size: 16px;
        padding: 12px 15px;
        border-radius: 11px;
        display: block;
        font-family: inherit;
        width: 100%;
        max-width: 350px;
        margin: 0 auto 15px auto;
        border: 2px solid #e1e1e1;
        text-align: center;
        transition: all 0.3s ease;
      }
      .form-control:focus {
        border-color: #0056b3;
        box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        outline: none;
      }
      .form-control:disabled,
      select:disabled {
        background-color: #f5f5f5;
        cursor: not-allowed;
        color: #999;
      }
      button {
        background-color: #0056b3;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
        width: 100%;
        max-width: 350px;
        margin: 0 auto;
        display: block;
        transition: transform 0.18s, box-shadow 0.18s, background 0.18s;
        position: relative;
        overflow: hidden;
        font-family: inherit;
      }
      button:hover:not(:disabled) {
        background-color: #004494;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
      button:active:not(:disabled) {
        transform: translateY(1px);
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      button:disabled {
        background-color: #6c757d !important;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
        animation: none;
      }
      .btn-text {
        position: relative;
        z-index: 2;
      }
      .ripple-span {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        transform: scale(0);
        animation: ripple 0.6s ease-out forwards;
        pointer-events: none;
        z-index: 1;
      }
      .btn-success {
        background-color: #28a745;
        margin-top: 20px;
        border-radius: 11px;
      }
      .btn-success:hover:not(:disabled) {
        background-color: #218838;
      }
      .bulk-wrapper {
        display: none;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin: 20px auto;
        flex-wrap: wrap;
        background: #f8f9fa;
        padding: 15px;
        border-radius: 10px;
        border: 1px dashed #0056b3;
        width: 100%;
        animation: popIn 0.5s ease-out;
      }
      .btn-danger {
        background-color: #dc3545;
        max-width: 140px;
        margin: 0;
        padding: 12px 15px;
        border-radius: 11px;
      }
      .btn-danger:hover:not(:disabled) {
        background-color: #c82333;
      }
      .btn-absent-all {
        background-color: #fd7e14;
        max-width: 140px;
        margin: 0;
        padding: 12px 15px;
        border-radius: 11px;
      }
      .btn-absent-all:hover:not(:disabled) {
        background-color: #e8590c;
      }
      .btn-reset-all {
        background-color: #6c757d;
        max-width: 140px;
        margin: 0;
        padding: 12px 15px;
        border-radius: 11px;
      }
      .btn-reset-all:hover:not(:disabled) {
        background-color: #5a6268;
      }
      .btn-clear-all {
        background-color: #17a2b8;
        max-width: 140px;
        margin: 0;
        padding: 12px 15px;
        border-radius: 11px;
      }
      .btn-clear-all:hover:not(:disabled) {
        background-color: #138496;
      }
      #tableControls {
        display: none;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        margin-top: 20px;
        background: #f8f9fa;
        border-radius: 10px;
        padding: 10px 15px;
        border: 1px solid #eee;
        gap: 10px;
      }
      #searchContainer {
        display: none;
        width: 100%;
        margin-top: 20px;
        animation: popIn 0.5s ease-out;
      }
      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        margin-top: 10px;
        background-color: white;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid #eee;
        display: none;
      }
      th,
      td {
        border-bottom: 1px solid #eee;
        border-left: 1px solid #eee;
        padding: 15px;
        text-align: center;
      }
      th:last-child,
      td:last-child {
        border-left: none;
      }
      tr:last-child td {
        border-bottom: none;
      }
      th {
        background-color: #0056b3;
        color: white;
        font-weight: 700;
      }
      tbody tr {
        transition: background 0.15s;
      }
      tbody tr:nth-child(even) {
        background-color: #fbfbfb;
      }
      tbody tr:hover {
        background: #eef4ff;
      }
      .row-anim {
        animation: rowIn 0.35s ease forwards;
        opacity: 0;
      }
      .score-input {
        width: 100%;
        max-width: 100px;
        padding: 10px;
        border-radius: 8px;
        border: 2px solid #e1e1e1;
        text-align: center;
        font-family: inherit;
        font-weight: bold;
        direction: ltr;
        margin: 0;
        transition: 0.3s;
      }
      .score-input:focus {
        border-color: #0056b3;
        box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        outline: none;
        background-color: #eef4ff;
      }
      .score-input:disabled {
        background-color: #f5f5f5;
        cursor: not-allowed;
        border-color: #ddd;
        color: #666;
      }
      .error-border {
        border-color: #b23a48 !important;
        box-shadow: 0 0 0 3px rgba(178, 58, 72, 0.2) !important;
        background-color: #fff0f0 !important;
      }
      .modified-input {
        background-color: #e6f6ec !important;
        border-color: #28a745 !important;
        box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.2) !important;
      }
      .checkbox-wrapper {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
      }
      .absent-label {
        font-weight: bold;
        color: #b23a48;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 14px;
        user-select: none;
      }
      .exempt-label {
        font-weight: bold;
        color: #fd7e14;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 14px;
        user-select: none;
      }
      .absent-checkbox,
      .exempt-checkbox {
        width: 18px;
        height: 18px;
        cursor: pointer;
        margin: 0;
      }
      .absent-checkbox {
        accent-color: #b23a48;
      }
      .exempt-checkbox {
        accent-color: #fd7e14;
      }
      .loader {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #0056b3;
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
        display: none;
      }
      .status-message {
        padding: 12px;
        border-radius: 8px;
        margin-top: 20px;
        font-size: 16px;
        font-weight: bold;
        width: 100%;
        animation: popIn 0.5s 0.1s ease-out both;
        display: none;
      }
      .success-msg {
        background-color: #008000;
        color: #f2e8cf;
        border: 1px solid #c3e6cb;
      }
      .error-msg {
        background-color: #b23a48;
        color: #fed0bb;
        border: 1px solid #f5c6cb;
      }
      .designer-credit {
        margin-top: 15px;
        font-size: 13px;
        color: #4a4e69;
        text-align: center;
        font-weight: bold;
      }
      .pagination-controls {
        display: none;
        justify-content: space-between;
        align-items: center;
        margin-top: 20px;
        background: #f8f9fa;
        padding: 10px 20px;
        border-radius: 10px;
        border: 1px solid #eee;
      }
      .page-btn {
        background-color: #4a4e69;
        color: white;
        padding: 8px 15px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        max-width: 100px;
        margin: 0;
      }
      .page-btn:hover:not(:disabled) {
        background-color: #333652;
      }
      .page-btn:disabled {
        background-color: #ccc !important;
        transform: none;
        box-shadow: none;
        animation: none;
      }
      .page-info {
        font-weight: bold;
        color: #0056b3;
      }
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        animation: fadeInPage 0.3s;
      }
      .modal-content {
        background: white;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        animation: popIn 0.3s ease-out;
        max-width: 90%;
        width: 400px;
      }
      .modal-title {
        color: #0056b3;
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 25px;
        line-height: 1.5;
      }
      .modal-buttons {
        display: flex;
        justify-content: center;
        gap: 15px;
      }
      .btn-modal-confirm,
      .btn-modal-cancel {
        margin: 0;
        padding: 10px 20px;
        max-width: 120px;
        border-radius: 11px;
      }
      .btn-modal-confirm {
        background-color: #28a745;
      }
      .btn-modal-confirm:hover:not(:disabled) {
        background-color: #218838;
      }
      .btn-modal-cancel {
        background-color: #dc3545;
      }
      .btn-modal-cancel:hover:not(:disabled) {
        background-color: #c82333;
      }
      .header-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        border-bottom: 2px solid #eee;
        padding-bottom: 10px;
      }
      .teacher-name {
        font-weight: bold;
        color: #0056b3;
        font-size: 15px;
      }
      .btn-logout {
        background-color: #dc3545;
        padding: 6px 12px;
        font-size: 13px;
        width: auto;
        margin: 0;
        border-radius: 8px;
      }
      .btn-logout:hover {
        background-color: #c82333;
      }
      @media (min-width: 768px) {
        .top-logos img {
          max-height: 160px;
        }
        .header-image img {
          max-width: 580px;
        }
        .bulk-wrapper {
          gap: 8px;
          padding: 15px 10px;
          flex-wrap: nowrap;
          overflow-x: auto;
          justify-content: center;
        }
        .bulk-wrapper::-webkit-scrollbar {
          height: 8px;
        }
        .bulk-wrapper::-webkit-scrollbar-thumb {
          background-color: #0056b3;
          border-radius: 10px;
        }
        .bulk-wrapper > * {
          flex-shrink: 0;
        }
        .bulk-wrapper button {
          max-width: 110px;
          font-size: 14px;
          padding: 10px 5px;
        }
        .bulk-wrapper span {
          font-size: 14px !important;
        }
      }
      @media (max-width: 480px) {
        body {
          padding: 15px 10px;
        }
        .container {
          padding: 25px 20px;
          border-radius: 10px;
        }
        .top-logos img {
          max-height: 90px;
        }
        h2 {
          font-size: 22px;
        }
        th,
        td {
          padding: 10px;
          font-size: 14px;
        }
        .form-control {
          max-width: 100%;
        }
        .bulk-wrapper {
          flex-direction: column !important;
          gap: 10px !important;
          padding: 15px !important;
        }
        .bulk-wrapper button {
          width: 180px !important;
          margin: 0 auto !important;
          max-width: 100% !important;
          display: block !important;
          padding: 12px !important;
          font-size: 15px !important;
        }
        .bulk-wrapper #bulkScoreInput {
          width: 180px !important;
          margin: 0 auto !important;
        }
        .bulk-wrapper span {
          display: block !important;
          width: 100% !important;
          text-align: center !important;
          margin-bottom: 5px !important;
        }
        #tableControls {
          flex-direction: column;
          justify-content: center;
          text-align: center;
        }
        .pagination-controls {
          flex-direction: column;
          gap: 10px;
        }
        .modal-content {
          padding: 20px;
        }
        .modal-buttons {
          flex-direction: column;
          gap: 10px;
        }
        .btn-modal-confirm,
        .btn-modal-cancel {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div
      class="dot"
      style="
        width: 90px;
        height: 90px;
        top: 8%;
        left: 4%;
        animation-duration: 6s;
      "
    ></div>
    <div
      class="dot"
      style="
        width: 60px;
        height: 60px;
        top: 20%;
        right: 6%;
        animation-duration: 8s;
        animation-delay: 1s;
      "
    ></div>
    <div
      class="dot"
      style="
        width: 120px;
        height: 120px;
        top: 55%;
        left: 2%;
        animation-duration: 10s;
        animation-delay: 2s;
      "
    ></div>
    <div
      class="dot"
      style="
        width: 50px;
        height: 50px;
        top: 70%;
        right: 4%;
        animation-duration: 7s;
        animation-delay: 0.5s;
      "
    ></div>
    <div
      class="dot"
      style="
        width: 80px;
        height: 80px;
        top: 38%;
        right: 11%;
        animation-duration: 9s;
        animation-delay: 3s;
      "
    ></div>

    <div class="container" id="loginContainer">
      <div class="top-logos">
        <img
          src="https://mosamirhelal.com/alkhateeb/logo_2.webp"
          alt="وزارة التربية والتعليم"
        />
        <img
          src="https://mosamirhelal.com/alkhateeb/logo_1.webp"
          alt="شعار المدرسة"
        />
      </div>
      <div class="header-image">
        <img
          src="https://mosamirhelal.com/alkhateeb/logo_3.webp"
          alt="مدرسة الشهيد محمود علي الخطيب"
        />
      </div>
      <h2>تسجيل الدخول للمعلمين</h2>
      <input
        type="text"
        id="usernameInput"
        class="form-control"
        placeholder="اسم المستخدم"
        dir="rtl"
      />
      <input
        type="password"
        id="passwordInput"
        class="form-control"
        placeholder="كلمة المرور"
        dir="ltr"
        onkeydown="if(event.key === 'Enter') doLogin()"
      />
      <button
        id="loginBtn"
        class="form-control pulse-button"
        onclick="addRipple(event, this); doLogin()"
      >
        <span class="btn-text">دخول المنصة</span>
      </button>
      <div class="loader" id="loginLoader"></div>
      <div id="loginMessage" class="status-message"></div>
      <div class="designer-credit">تصميم وتنفيذ : سمير هلال</div>
    </div>

    <div class="container" id="mainContainer" style="display: none">
      <div class="header-actions">
        <span class="teacher-name" id="teacherNameDisplay"></span>
        <button class="btn-logout" onclick="showLogoutConfirm()">
          تسجيل خروج
        </button>
      </div>
      <div class="top-logos">
        <img
          src="https://mosamirhelal.com/alkhateeb/logo_2.webp"
          alt="وزارة التربية والتعليم"
        />
        <img
          src="https://mosamirhelal.com/alkhateeb/logo_1.webp"
          alt="شعار المدرسة"
        />
      </div>
      <div class="header-image">
        <img
          src="https://mosamirhelal.com/alkhateeb/logo_3.webp"
          alt="مدرسة الشهيد محمود علي الخطيب"
        />
      </div>
      <h2>بوابة إدخال الدرجات</h2>

      <select id="gradeSelect" class="form-control" onchange="showSections()">
        <option value="">-- اختر الصف الدراسي --</option>
        <option value="ثالث ابتدائي">الصف الثالث الابتدائي</option>
        <option value="رابع ابتدائي">الصف الرابع الابتدائي</option>
        <option value="خامس ابتدائي">الصف الخامس الابتدائي</option>
        <option value="سادس ابتدائي">الصف السادس الابتدائي</option>
        <option value="أول اعدادي">الصف الأول الإعدادي</option>
        <option value="ثاني اعدادي">الصف الثاني الإعدادي</option>
      </select>

      <select
        id="sectionSelect"
        class="form-control"
        style="display: none"
        onchange="showSubjects()"
      >
        <option value="">-- اختر رقم الفصل --</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>

      <select
        id="subjectSelect"
        class="form-control"
        style="display: none"
        onchange="showEvaluations()"
      >
        <option value="">-- اختر المادة --</option>
      </select>

      <select
        id="evaluationSelect"
        class="form-control"
        style="display: none"
        onchange="showSearchBtn()"

      function doLogin() {
        const userInput = document.getElementById("usernameInput");
        const passInput = document.getElementById("passwordInput");
        const user = userInput.value.trim();
        const pass = passInput.value.trim();
        const msgDiv = document.getElementById("loginMessage");
        const btn = document.getElementById("loginBtn");
        const loader = document.getElementById("loginLoader");

        if (!user || !pass) {
          msgDiv.innerText = "يرجى إدخال اسم المستخدم وكلمة المرور.";
          msgDiv.className = "status-message error-msg";
          msgDiv.style.display = "block";
          return;
        }
        msgDiv.style.display = "none";
        btn.disabled = true;
        userInput.disabled = true;
        passInput.disabled = true;
        btn.classList.remove("pulse-button");
        btn.querySelector(".btn-text").innerText = "جاري التحقق...";
        loader.style.display = "block";

        const payload = { action: "login", username: user, password: pass };
        fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload),
        })
          .then((response) => response.json())
          .then((data) => {
            loader.style.display = "none";
            btn.disabled = false;
            btn.classList.add("pulse-button");
            btn.querySelector(".btn-text").innerText = "دخول المنصة";
            if (data.status === "success") {
              localStorage.setItem(
                "alkhateeb_auth",
                JSON.stringify({ token: data.token, name: data.teacherName })
              );
              userInput.disabled = false;
              passInput.disabled = false;
              userInput.value = "";
              passInput.value = "";
              checkAuth();
            } else {
              userInput.disabled = false;
              passInput.disabled = false;
              msgDiv.innerText = data.message;
              msgDiv.className = "status-message error-msg";
              msgDiv.style.display = "block";
            }
          })

            loader.style.display = "none";

            btn.querySelector(".btn-text").innerText = "دخول المنصة";

      function escapeHTML(str) {
        return String(str).replace(/[&<>'"]/g, function (tag) {
          const chars = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            "'": "&#39;",
            '"': "&quot;",
          };
          return chars[tag] || tag;
        });
      }

      function restoreStateLocally() {
        const draft = localStorage.getItem("alkhateeb_grades_draft");
        if (draft) {
          try {
            const state = JSON.parse(draft);
            const now = Date.now();
            const expirationTime = 30 * 60 * 1000;
            if (!state.timestamp || now - state.timestamp > expirationTime) {
              localStorage.removeItem("alkhateeb_grades_draft");
              return;
            }
            if (state.students && state.students.length > 0) {
              allStudents = state.students;
              filteredStudents = [...allStudents];
              currentPage = state.currentPage || 1;
              if (state.rowsPerPage) {

          }
        }
      }

      function addRipple(e, btn) {
        if (btn.disabled) return;
        const rect = btn.getBoundingClientRect();
        let x, y;
        if (e.clientX !== undefined && e.clientX !== 0) {
          x = e.clientX - rect.left;
          y = e.clientY - rect.top;
        } else if (e.touches && e.touches.length > 0) {
          x = e.touches[0].clientX - rect.left;
          y = e.touches[0].clientY - rect.top;
        } else {
          x = rect.width / 2;
          y = rect.height / 2;
        }
        const size = Math.max(rect.width, rect.height);
        const span = document.createElement("span");
        span.className = "ripple-span";
        span.style.width = span.style.height = size + "px";
        span.style.left = x - size / 2 + "px";
        span.style.top = y - size / 2 + "px";
        btn.appendChild(span);
        setTimeout(() => span.remove(), 600);
      }

      function convertToEnglishNumbers(str) {
        const arabicNumbers = [
          "٠",
          "١",
          "٢",
          "٣",
          "٤",
          "٥",
          "٦",
          "٧",
          "٨",
          "٩",
        ];
        let englishStr = String(str).replace(/[٠-٩]/g, function (w) {
          return arabicNumbers.indexOf(w);
        });
        return englishStr.replace(/[^0-9.]/g, "");
      }

        renderTable();

      function handleScoreInput(studentId, inputEl) {
        inputEl.classList.remove("error-border");
        let cleanedStr = convertToEnglishNumbers(inputEl.value);
        if (cleanedStr !== "") {
          let num = parseFloat(cleanedStr);
          if (num > 100) cleanedStr = "";
        }
        inputEl.value = cleanedStr;
        updateStudentScore(studentId, cleanedStr);
        checkModifiedState(studentId, inputEl);
      }

      function toggleAbsence(studentId, isChecked) {
        const inputEl = document.getElementById("score_" + studentId);
        const exemptBox = document.querySelector(
          `#row_${studentId} .exempt-checkbox`
        );
        inputEl.classList.remove("error-border");
        if (isChecked) {
          inputEl.value = "غائب";
          inputEl.disabled = true;
          if (exemptBox) {
            exemptBox.checked = false;
            exemptBox.disabled = true;
          }
          updateStudentScore(studentId, "غ");
        } else {
          inputEl.value = "";
          inputEl.disabled = false;
          if (exemptBox) exemptBox.disabled = false;
          updateStudentScore(studentId, "");
          inputEl.focus();
        }
        checkModifiedState(studentId, inputEl);
      }

      function toggleExempt(studentId, isChecked) {
        const inputEl = document.getElementById("score_" + studentId);
        const absentBox = document.querySelector(
          `#row_${studentId} .absent-checkbox`
        );
        inputEl.classList.remove("error-border");
        if (isChecked) {

            absentBox.disabled = true;

        } else {
          inputEl.value = "";
          inputEl.disabled = false;
          if (absentBox) absentBox.disabled = false;
          updateStudentScore(studentId, "");
          inputEl.focus();
        }
        checkModifiedState(studentId, inputEl);
      }

      function checkModifiedState(studentId, inputEl) {
        const student = allStudents.find(
          (s) => String(s.id) === String(studentId)
        );
        if (student) {
          if (
            student.score !== student.originalScore &&
            !student.suppressGreen
          ) {
            inputEl.classList.add("modified-input");
          } else {
            inputEl.classList.remove("modified-input");
          }
        }
        updateSaveButton();
      }

      function updateSaveButton() {
        const saveBtnText = document.querySelector("#saveBtn .btn-text");
        if (!saveBtnText) return;
        const modifiedCount = allStudents.filter(
          (s) => s.score !== s.originalScore
        ).length;
        if (modifiedCount === 0) saveBtnText.innerText = "💾 حفظ الدرجات";
        else if (modifiedCount === 1)
          saveBtnText.innerText = "💾 حفظ درجة طالب واحد";
        else if (modifiedCount === 2)
          saveBtnText.innerText = "💾 حفظ درجات طالبين";
        else if (modifiedCount >= 3 && modifiedCount <= 10)
          saveBtnText.innerText = "💾 حفظ درجات " + modifiedCount + " طلاب";
        else saveBtnText.innerText = "💾 حفظ درجات " + modifiedCount + " طالب";
      }

        hideTableAndMessages();
        const evaluation = document.getElementById("evaluationSelect").value;
        const searchBtn = document.getElementById("searchBtn");
        if (evaluation !== "") {
          searchBtn.style.display = "block";
          searchBtn.style.animation = "slideInUp 0.3s ease-out";
          setTimeout(function () {
            searchBtn.style.animation = "";
          }, 300);
        } else {
          searchBtn.style.display = "none";
        }
      }

      function showMessage(text, isError = false) {
        const msgDiv = document.getElementById("inlineMessage");
        msgDiv.innerText = text;
        msgDiv.className = isError
          ? "status-message error-msg"
          : "status-message success-msg";
        msgDiv.style.display = "block";
      }

      function showSaveMessage(text, isError = false) {
        const msgDiv = document.getElementById("saveMessage");
        msgDiv.innerText = text;
        msgDiv.className = isError
          ? "status-message error-msg"
          : "status-message success-msg";
        msgDiv.style.display = "block";
      }

      function showBulkConfirm() {
        const inputEl = document.getElementById("bulkScoreInput");
        let cleanedStr = convertToEnglishNumbers(inputEl.value);
        if (cleanedStr !== "") {
          let num = parseFloat(cleanedStr);
          if (num > 100) {
            inputEl.value = "";
            showMessage("الدرجة لا يمكن أن تتجاوز 100", true);
            return;
          }
          currentModalAction = "bulkScore";
          document.getElementById("modalTitleText").innerText =
            "هل تريد بالتأكيد تعميم هذه الدرجة على جميع الطلاب الحاضرين؟";
          document.getElementById("customModal").style.display = "flex";
        } else {
          showMessage("⚠️ يرجى إدخال درجة صالحة أولاً.", true);
        }
      }

      function showAbsentConfirm() {
        currentModalAction = "bulkAbsent";
        document.getElementById("modalTitleText").innerText =
          "هل تريد بالتأكيد تسجيل غياب لجميع الطلاب؟";
        document.getElementById("customModal").style.display = "flex";
      }

      function showPresentConfirm() {
        currentModalAction = "allPresent";
        document.getElementById("modalTitleText").innerText =
          "هل تريد بالتأكيد إلغاء الغياب لجميع الطلاب ليصبحوا حاضرين؟";
        document.getElementById("customModal").style.display = "flex";
      }

      function showClearConfirm() {
        currentModalAction = "clearAll";
        document.getElementById("modalTitleText").innerText =
          "هل تريد بالتأكيد مسح جميع الدرجات وتفريغ الحقول بالكامل؟";
        document.getElementById("customModal").style.display = "flex";
      }

      function showLogoutConfirm() {
        const hasChanges = allStudents.some((s) => s.score !== s.originalScore);
        if (hasChanges) {
          currentModalAction = "logout";
          document.getElementById("modalTitleText").innerText =
            "⚠️ لديك درجات لم يتم حفظها! هل أنت متأكد أنك تريد تسجيل الخروج وإلغاء تعديلاتك؟";
          document.getElementById("customModal").style.display = "flex";
        } else {
          executeLogout();
        }
      }

      function executeModalAction() {
        if (currentModalAction === "bulkScore") confirmBulkScore();
        else if (currentModalAction === "bulkAbsent") confirmBulkAbsent();
        else if (currentModalAction === "allPresent") confirmAllPresent();
        else if (currentModalAction === "clearAll") confirmClearAll();
        else if (currentModalAction === "logout") executeLogout();
      }

      function confirmBulkAbsent() {
        for (let i = 0; i < allStudents.length; i++) {
          if (
            allStudents[i].score !== "معفي" &&
            allStudents[i].score !== "غير مسجل"
          ) {
            allStudents[i].score = "غ";
            allStudents[i].suppressGreen = true;
          }
        }
        filteredStudents = [...allStudents];
        closeBulkModal();
        renderTable();
        saveStateLocally();
        showMessage("✅ تم تسجيل غياب جميع الطلاب بنجاح.", false);
      }

      function confirmAllPresent() {
        for (let i = 0; i < allStudents.length; i++) {
          if (allStudents[i].score === "غ") {
            allStudents[i].score = "";
            allStudents[i].suppressGreen = true;
          }
        }
        filteredStudents = [...allStudents];
        closeBulkModal();
        renderTable();
        saveStateLocally();
        showMessage(
          "✅ تم إلغاء الغياب وتحويل الطلاب إلى حاضرين بنجاح.",
          false
        );
      }

      function confirmClearAll() {
        for (let i = 0; i < allStudents.length; i++) {
          if (
            allStudents[i].score !== "معفي" &&
            allStudents[i].score !== "غير مسجل"
          ) {
            allStudents[i].score = "";
            allStudents[i].suppressGreen = true;
          }
        }
        filteredStudents = [...allStudents];
        highlightErrors = false;
        closeBulkModal();
        renderTable();
        saveStateLocally();
        showMessage("✅ تم تفريغ الحقول بنجاح.", false);
      }

      function confirmBulkScore() {
        const inputEl = document.getElementById("bulkScoreInput");
        let cleanedStr = convertToEnglishNumbers(inputEl.value);
        for (let i = 0; i < allStudents.length; i++) {
          if (
            allStudents[i].score !== "غ" &&
            allStudents[i].score !== "معفي" &&
            allStudents[i].score !== "غير مسجل"
          ) {
            allStudents[i].score = cleanedStr;
            allStudents[i].suppressGreen = false;
          }
        }
        filteredStudents = [...allStudents];
        inputEl.value = "";
        closeBulkModal();
        renderTable();
        saveStateLocally();
        showMessage(
          "✅ تم تعميم الدرجة بنجاح على جميع الطلاب الحاضرين.",
          false
        );
      }

      function closeBulkModal() {
        document.getElementById("customModal").style.display = "none";
        currentModalAction = "";
      }

      function fetchStudents() {
        const authData = localStorage.getItem("alkhateeb_auth");
        if (!authData) {
          checkAuth();
          return;
        }
        const auth = JSON.parse(authData);

        const gradeSelect = document.getElementById("gradeSelect");
        const sectionSelect = document.getElementById("sectionSelect");
        const subjectSelect = document.getElementById("subjectSelect");
        const evaluationSelect = document.getElementById("evaluationSelect");
        const searchBtn = document.getElementById("searchBtn");
        const loader = document.getElementById("mainLoader");
        const searchBtnText = searchBtn.querySelector(".btn-text");

        const grade = gradeSelect.value;
        const section = sectionSelect.value;
        const subject = subjectSelect.value;

        const evalValue = evaluationSelect.value;
        const [examType, month] = evalValue.split("_");

        hideTableAndMessages();
        loader.style.display = "block";
        searchBtn.disabled = true;
        searchBtn.classList.remove("pulse-button");
        searchBtnText.innerText = "⏳ جاري البحث...";

        gradeSelect.disabled = true;
        sectionSelect.disabled = true;
        subjectSelect.disabled = true;
        evaluationSelect.disabled = true;

        const payload = {
          action: "getStudents",
          token: auth.token,
          grade: grade,
          section: section,
          subject: subject,
          month: month,
          examType: examType,
        };

        fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload),
        })
          .then((response) => response.json())
          .then((data) => {
            loader.style.display = "none";
            searchBtn.disabled = false;
            searchBtn.classList.add("pulse-button");
            searchBtnText.innerText = "🔎 عرض كشف الطلاب";

            gradeSelect.disabled = false;
            sectionSelect.disabled = false;
            subjectSelect.disabled = false;
            evaluationSelect.disabled = false;

            if (data.status === "error") {
              if (data.message.includes("موقوف")) {
                executeLogout();
                return;
              }
              if (
                data.message.includes("منتهية") ||
                data.message.includes("غير صالحة")
              ) {
                handleSessionExpired();
                return;
              }
              showMessage(data.message, true);
              return;
            }
            if (data.students.length === 0) {
              showMessage("لا يوجد طلاب مسجلين طبقًا للخيارات السابقة.", true);
              return;
            }

            allStudents = data.students.map((s) => ({
              ...s,
              originalScore: String(s.score).trim(),
              score: String(s.score).trim(),
              suppressGreen: false,
            }));
            document.getElementById("liveSearchInput").value = "";
            filteredStudents = [...allStudents];
            currentPage = 1;
            highlightErrors = false;

            const saveBtn = document.getElementById("saveBtn");
            saveBtn.disabled = false;
            saveBtn.onclick = function (event) {
              addRipple(event, this);
              saveData();
            };
            saveBtn.className = "form-control btn-success pulse-success";

            document.getElementById("bulkScoreInput").value = "";
            document.getElementById("bulkScoreDiv").style.display = "flex";
            document.getElementById("searchContainer").style.display = "block";
            document.getElementById("tableControls").style.display = "flex";

            renderTable();
            saveStateLocally();
            document.getElementById("studentsTable").style.display = "table";
            saveBtn.style.display = "block";

            setTimeout(() => {
              const firstInput = document.querySelector(
                ".student-score:not(:disabled)"
              );
              if (firstInput) {
                firstInput.focus();
                firstInput.select();
              }
            }, 100);
          })
          .catch((error) => {
            loader.style.display = "none";
            searchBtn.disabled = false;
            searchBtn.classList.add("pulse-button");
            searchBtnText.innerText = "🔎 عرض كشف الطلاب";
            gradeSelect.disabled = false;
            sectionSelect.disabled = false;
            subjectSelect.disabled = false;
            evaluationSelect.disabled = false;
            showMessage("حدث خطأ في الاتصال بقاعدة البيانات.", true);
          });
      }

      function renderTable() {
        const tbody = document.getElementById("studentsBody");
        tbody.innerHTML = "";
        const totalPages = Math.ceil(filteredStudents.length / rowsPerPage);
        document.getElementById("currentPageNum").innerText = currentPage;
        document.getElementById("totalPagesNum").innerText =
          totalPages > 0 ? totalPages : 1;
        const pagination = document.getElementById("paginationDiv");

        if (totalPages > 1) {
          pagination.style.display = "flex";
          document.getElementById("prevBtn").disabled = currentPage === 1;
          document.getElementById("nextBtn").disabled =
            currentPage === totalPages;
        } else {
          pagination.style.display = "none";
        }

        const start = (currentPage - 1) * rowsPerPage;
        const end = Math.min(start + rowsPerPage, filteredStudents.length);
        const pageStudents = filteredStudents.slice(start, end);

        document.getElementById(
          "studentCountInfo"
        ).innerText = `إجمالي الطلاب: ${allStudents.length} | الظاهر بالصفحة: ${pageStudents.length}`;

        pageStudents.forEach((student, index) => {
          const isAbsent = student.score === "غ" || student.score === "غائب";
          const isExempt =
            student.score === "معفي" || student.score === "غير مسجل";

          let displayScore = student.score;
          if (isAbsent) displayScore = "غائب";
          if (isExempt) displayScore = "غير مسجل";

          const isEmpty =
            student.score === "" ||
            student.score === null ||
            student.score === undefined;
          const isErrorClass =
            highlightErrors && !isAbsent && !isExempt && isEmpty
              ? "error-border"
              : "";
          const isModifiedClass =
            student.score !== student.originalScore && !student.suppressGreen
              ? "modified-input"
              : "";
          const isDisabled = isAbsent || isExempt ? "disabled" : "";

          const row = document.createElement("tr");
          row.id = "row_" + student.id;
          row.className = "row-anim";
          row.style.animationDelay = `${Math.min(index * 0.02, 0.4)}s`;
          row.innerHTML = `
            <td style='font-weight:600; color:#0056b3; vertical-align: middle;'>${escapeHTML(
              student.name
            )}</td>
            <td>
              <div class="checkbox-wrapper">
                <input type='text' inputmode='numeric' class='score-input student-score ${isErrorClass} ${isModifiedClass}' placeholder='الدرجة' value='${displayScore}' 
                       id='score_${
                         student.id
                       }' ${isDisabled} onfocus='this.select()' oninput='handleScoreInput("${
            student.id
          }", this)' onkeydown='handleEnter(event, this)'>
                <label class="exempt-label"><input type='checkbox' class='exempt-checkbox' ${
                  isExempt ? "checked" : ""
                } ${isAbsent ? "disabled" : ""} onchange='toggleExempt("${
            student.id
          }", this.checked)'> غير مسجل</label>
                <label class="absent-label"><input type='checkbox' class='absent-checkbox' ${
                  isAbsent ? "checked" : ""
                } ${isExempt ? "disabled" : ""} onchange='toggleAbsence("${
            student.id
          }", this.checked)'> غائب</label>
              </div>
            </td>
          `;
          tbody.appendChild(row);
        });
        updateSaveButton();
      }

      function changePage(direction) {
        currentPage += direction;
        saveStateLocally();
        renderTable();
      }

      function updateStudentScore(studentId, value) {
        const student = allStudents.find(
          (s) => String(s.id) === String(studentId)
        );
        if (student) {
          student.score = value;
          student.suppressGreen = false;
          saveStateLocally();
        }
      }

      function handleEnter(event, currentInput) {
        if (event.key === "Enter") {
          event.preventDefault();
          const inputs = Array.from(
            document.getElementsByClassName("student-score")
          );
          const currentIndex = inputs.indexOf(currentInput);
          const totalPages = Math.ceil(filteredStudents.length / rowsPerPage);
          let nextIndex = currentIndex + 1;
          while (nextIndex < inputs.length && inputs[nextIndex].disabled) {
            nextIndex++;
          }
          if (nextIndex < inputs.length) {
            inputs[nextIndex].focus();
            inputs[nextIndex].select();
          } else {
            if (currentPage < totalPages) {
              changePage(1);
              setTimeout(() => {
                const newInputs = Array.from(
                  document.getElementsByClassName("student-score")
                );
                let firstEnabledIndex = 0;
                while (
                  firstEnabledIndex < newInputs.length &&
                  newInputs[firstEnabledIndex].disabled
                ) {
                  firstEnabledIndex++;
                }
                if (firstEnabledIndex < newInputs.length) {
                  newInputs[firstEnabledIndex].focus();
                  newInputs[firstEnabledIndex].select();
                }
              }, 50);
            } else {
              saveData();
            }
          }
        }
      }

      function saveData() {
        const authData = localStorage.getItem("alkhateeb_auth");
        if (!authData) {
          checkAuth();
          return;
        }
        const auth = JSON.parse(authData);
        const saveBtn = document.getElementById("saveBtn");
        const saveBtnText = saveBtn.querySelector(".btn-text");
        if (saveBtn.disabled) return;

        let emptyStudentId = null;
        for (let i = 0; i < allStudents.length; i++) {
          if (
            allStudents[i].score === "" ||
            allStudents[i].score === null ||
            allStudents[i].score === undefined
          ) {
            emptyStudentId = allStudents[i].id;
            break;
          }
        }

        if (emptyStudentId !== null) {
          document.getElementById("liveSearchInput").value = "";
          filterTable();
          const indexInFiltered = filteredStudents.findIndex(
            (s) => String(s.id) === String(emptyStudentId)
          );
          highlightErrors = true;
          if (indexInFiltered !== -1) {
            const targetPage = Math.floor(indexInFiltered / rowsPerPage) + 1;
            if (currentPage !== targetPage) {
              currentPage = targetPage;
            }
          }
          renderTable();
          showSaveMessage("⚠️ يرجى إدخال جميع الدرجات، توجد حقول فارغة!", true);
          setTimeout(() => {
            const emptyInput = document.getElementById(
              "score_" + emptyStudentId
            );
            if (emptyInput && !emptyInput.disabled) {
              emptyInput.scrollIntoView({
                behavior: "smooth",
                block: "center",
              });
              emptyInput.focus({ preventScroll: true });
            }
          }, 100);
          return;
        }

        highlightErrors = false;
        document.getElementById("inlineMessage").style.display = "none";
        document.getElementById("saveMessage").style.display = "none";
        saveBtn.disabled = true;
        saveBtn.classList.remove("pulse-success");
        saveBtnText.innerText = "⏳ جاري الحفظ...";

        const evalValue = document.getElementById("evaluationSelect").value;
        const [examType, month] = evalValue.split("_");

        const modifiedStudents = allStudents.filter(
          (s) => s.score !== s.originalScore
        );
        const payload = {
          action: "saveGrades",
          token: auth.token,
          grade: document.getElementById("gradeSelect").value,
          section: document.getElementById("sectionSelect").value,
          subject: document.getElementById("subjectSelect").value,
          month: month,
          examType: examType,
          gradesData: modifiedStudents,
        };

        fetch(APPS_SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload),
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.status === "success") {
              allStudents.forEach((s) => {
                s.originalScore = s.score;
                s.suppressGreen = false;
              });
              localStorage.removeItem("alkhateeb_grades_draft");
              document.getElementById("studentsTable").style.display = "none";
              document.getElementById("tableControls").style.display = "none";
              document.getElementById("searchContainer").style.display = "none";
              document.getElementById("paginationDiv").style.display = "none";
              document.getElementById("saveBtn").style.display = "none";
              document.getElementById("bulkScoreDiv").style.display = "none";

              document.getElementById("sectionSelect").style.display = "none";
              document.getElementById("subjectSelect").style.display = "none";
              document.getElementById("evaluationSelect").style.display =
                "none";
              document.getElementById("searchBtn").style.display = "none";

              document.getElementById("gradeSelect").value = "";
              document.getElementById("sectionSelect").value = "";
              document.getElementById("subjectSelect").value = "";
              document.getElementById("evaluationSelect").value = "";

              showSaveMessage("✅ تم حفظ درجات الفصل بنجاح!");
            } else {
              saveBtn.disabled = false;
              saveBtn.classList.add("pulse-success");
              updateSaveButton();
              if (data.message.includes("موقوف")) {
                executeLogout();
                return;
              }
              if (
                data.message.includes("منتهية") ||
                data.message.includes("غير صالحة")
              ) {
                handleSessionExpired();
                return;
              }
              showSaveMessage("❌ حدث خطأ: " + data.message, true);
            }
          })
          .catch((error) => {
            saveBtn.disabled = false;
            saveBtn.classList.add("pulse-success");
            updateSaveButton();
            showSaveMessage(
              "حدث مشكلة في الإرسال، تأكد من الاتصال بالإنترنت.",
              true
            );
          });
      }
    </script>
  </body>
</html>
