<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتيجة الطلاب</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 10px; width: 450px; margin: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { padding: 10px 20px; background-color: #0056b3; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #004494; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #0056b3; color: white; }
        .total-row { font-weight: bold; background-color: #e9ecef; }
        
        .percentage { font-size: 20px; font-weight: bold; color: #28a745; margin-top: 20px; text-align: center; border-top: 2px dashed #ccc; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>استعلام عن النتيجة</h2>
    <input type="text" id="nationalId" placeholder="أدخل الرقم القومي للطالب">
    <button onclick="getGrade()">بحث</button>
    <div id="result"></div>
</div>

<script>
    
    function checkEmpty(value) {
        if (value === "" || value === null || value === undefined) {
            return "-";
        }
        return value;
    }

    function getGrade() {
        var id = document.getElementById('nationalId').value;
        var resultDiv = document.getElementById('result');
        
        if (!id) {
            resultDiv.innerHTML = "<div style='color:red; margin-top:15px;'>الرجاء إدخال الرقم القومي أولاً</div>";
            return;
        }

        resultDiv.innerHTML = "<div style='color:gray; margin-top:15px;'>جاري البحث عن النتيجة...</div>";

        
        var url = 'https://script.google.com/macros/s/AKfycbzY0HaGxuADEwpsQjGSWWv2HEGKltTHL9afL-suKsUGUvxf6RtXckD7HhVuAcFegtXn/exec?id=' + id;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    
                    var ar = checkEmpty(data.arabic);
                    var ar_max = checkEmpty(data.arabic_max);
                    var en = checkEmpty(data.english);
                    var en_max = checkEmpty(data.english_max);
                    var sc = checkEmpty(data.science);
                    var sc_max = checkEmpty(data.science_max);
                    var ma = checkEmpty(data.math);
                    var ma_max = checkEmpty(data.math_max);
                    var total = checkEmpty(data.total);
                    var total_max = checkEmpty(data.total_max); 
                    var perc = checkEmpty(data.percentage);

                    var displayPerc = (perc !== "-") ? perc + "%" : "-";

                    var html = `
                        <h3 style="color:#333; margin-top:20px;">الاسم: ${data.name}</h3>
                        <table>
                            <tr>
                                <th>المادة</th>
                                <th>درجة الطالب</th>
                                <th>الدرجة النهائية</th>
                            </tr>
                            <tr><td>اللغة العربية</td><td>${ar}</td><td>${ar_max}</td></tr>
                            <tr><td>اللغة الإنجليزية</td><td>${en}</td><td>${en_max}</td></tr>
                            <tr><td>العلوم</td><td>${sc}</td><td>${sc_max}</td></tr>
                            <tr><td>الرياضيات</td><td>${ma}</td><td>${ma_max}</td></tr>
                            <tr class="total-row"><td>المجموع الكلي</td><td>${total}</td><td>${total_max}</td></tr>
                        </table>
                        <div class="percentage">النسبة المئوية: ${displayPerc}</div>
                    `;
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = `<div style='color:red; margin-top:15px;'>${data.message}</div>`;
                }
            })
            .catch(error => {
                resultDiv.innerHTML = "<div style='color:red; margin-top:15px;'>حدث خطأ في الاتصال بقاعدة البيانات. تأكد من الإنترنت.</div>";
            });
    }
</script>

</body>
</html>
